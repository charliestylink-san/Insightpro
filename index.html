<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Insight</title>
<style>
/* ── TOKENS ── */
:root{
--bg:        #0a0a0f;
--surface:   #13131a;
--surface2:  #1c1c26;
--surface3:  #252533;
--border:    #2a2a3a;
--text:      #e8e8f0;
--muted:     #6b6b80;
--accent:    #7b8cde;
--green:     #3ecf8e;
--gold:      #f5a623;
--red:       #e55353;
--teal:      #2dd4bf;
--mono:      'SF Mono','Fira Code',monospace;
--sans:      -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
--radius:    12px;
--safe-b:    env(safe-area-inset-bottom,0px);
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:var(--sans);font-size:14px;line-height:1.5}

#app{display:flex;flex-direction:column;height:100%;height:100dvh;padding-top:env(safe-area-inset-top,0px)}
#panels{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 14px max(80px,calc(70px + env(safe-area-inset-bottom)))}
.panel{display:none}
.panel.active{display:block}
.panel-inner{/* inline */}

/* ── NAV ── */
#nav{display:flex;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,0px)}
.nav-btn{flex:1;padding:8px 0;font-size:9px;font-weight:600;letter-spacing:.3px;color:var(--muted);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;transition:color .2s,border-color .2s;display:flex;flex-direction:column;align-items:center;gap:2px}
.nav-btn .icon{font-size:17px;line-height:1}
.nav-btn.active{color:var(--accent);border-bottom-color:var(--accent)}

/* ── SHOP RAIL ── */
#shop-rail{display:flex;gap:6px;overflow-x:auto;
  padding:8px 14px 8px;
  border-bottom:1px solid var(--border);background:var(--surface);
  flex-shrink:0;scrollbar-width:none;align-items:center}
#shop-rail::-webkit-scrollbar{display:none}
.shop-pill{font-family:var(--mono);font-size:11px;font-weight:700;
  padding:4px 10px;border-radius:16px;border:1px solid var(--border);
  background:var(--surface2);color:var(--muted);cursor:pointer;
  white-space:nowrap;flex-shrink:0;transition:all .15s}
.shop-pill.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.shop-pill.has-data{color:var(--text)}
.shop-pill.pending-pred{border-color:var(--accent)}
#add-shop-btn{font-size:18px;padding:0 8px;background:none;border:none;
  color:var(--muted);cursor:pointer;line-height:1;align-self:center}

/* ── COLLAPSIBLE SECTIONS ── */
.section-title{font-size:10px;font-weight:700;color:var(--muted);
  letter-spacing:.8px;text-transform:uppercase;padding:8px 0 6px;
  display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.section-title .toggle-icon{font-size:10px;color:var(--muted);margin-left:2px;
  transition:transform .2s;flex-shrink:0}
.section-title.collapsed .toggle-icon{transform:rotate(-90deg)}
.section-body{transition:max-height .25s ease}
.section-body.collapsed{max-height:0!important;overflow:hidden}

/* ── CARD ── */
.card{background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:12px;margin-bottom:10px}
.card-title{font-size:11px;font-weight:700;color:var(--muted);
  letter-spacing:.6px;text-transform:uppercase;margin-bottom:8px}

/* ── BUTTONS ── */
.btn{font-size:12px;font-weight:700;padding:8px 14px;border-radius:20px;
  border:1px solid var(--border);cursor:pointer;transition:all .15s;
  font-family:var(--sans);white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:active{opacity:.85}
.btn-secondary{background:var(--surface2);color:var(--text);border-color:var(--border)}
.btn-secondary:active{background:var(--surface3)}
.btn-danger{background:rgba(229,83,83,.15);color:var(--red);border-color:var(--red)}
.btn-sm{font-size:11px;padding:5px 10px}
.btn-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}

/* ── INPUTS ── */
.input{width:100%;background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;padding:10px 12px;color:var(--text);font-size:14px;
  font-family:var(--sans);outline:none;transition:border-color .15s}
.input:focus{border-color:var(--accent)}
.input-label{font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:600}

/* ── CODE TAGS ── */
#tag-grid{display:flex;flex-wrap:wrap;gap:5px;margin:8px 0}
.code-tag{font-family:var(--mono);font-size:13px;font-weight:900;
  padding:4px 10px;border-radius:8px;background:var(--surface2);
  border:1px solid var(--border);color:var(--accent);cursor:pointer}
.code-tag:active{background:var(--surface3)}

/* ── STAT ROW ── */
.stat-row{display:flex;gap:8px;margin-bottom:8px}
.stat-box{flex:1;background:var(--surface2);border-radius:10px;padding:8px;text-align:center}
.stat-val{font-size:20px;font-weight:900;font-family:var(--mono);line-height:1}
.stat-lbl{font-size:9px;color:var(--muted);font-weight:700;letter-spacing:.4px;
  text-transform:uppercase;margin-top:2px}

/* ── SIGNAL BAR ── */
.sig-bar-wrap{margin-bottom:6px}
.sig-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.sig-bar-name{font-size:11px;color:var(--muted);min-width:72px}
.sig-bar-track{flex:1;height:4px;background:var(--surface3);border-radius:2px;overflow:hidden}
.sig-bar-fill{height:100%;border-radius:2px;transition:width .3s}
.sig-bar-val{font-size:11px;font-family:var(--mono);font-weight:700;min-width:36px;text-align:right}
.sig-bar-lift{font-size:10px;min-width:52px;text-align:right}

/* ── PREDICTION CARD ── */
.pred-code-row{display:flex;align-items:center;gap:6px;padding:4px 0}
.pred-code{font-family:var(--mono);font-size:14px;font-weight:900;min-width:28px}
.pred-grade{font-size:10px;font-weight:900;font-family:var(--mono);
  padding:1px 5px;border-radius:6px;background:rgba(0,0,0,.3)}
.pred-bar-track{flex:1;height:5px;background:var(--surface3);border-radius:3px;overflow:hidden}
.pred-bar-fill{height:100%;border-radius:3px}
.pred-pct{font-size:11px;font-family:var(--mono);font-weight:700;min-width:32px;text-align:right}
.pred-sigs{font-size:9px;color:var(--muted);min-width:80px;text-align:right}
.pred-divider{border-top:1px solid var(--border);margin:4px 0}

/* ── TRACK CHART ── */
.acc-chart{display:flex;align-items:flex-end;gap:2px;height:44px;
  background:var(--surface2);border-radius:6px;padding:0 3px;position:relative}
.acc-bar{flex:1;min-width:8px;border-radius:2px 2px 0 0;opacity:.85;transition:height .3s}
.acc-ma-dot{position:absolute;width:4px;height:4px;border-radius:50%;
  background:var(--teal);transform:translate(-50%,-50%)}

/* ── ARCHIVE LIST ── */
.entry-row{display:flex;align-items:flex-start;gap:8px;
  padding:8px 0;border-bottom:1px solid var(--border)}
.entry-date{font-size:11px;font-family:var(--mono);color:var(--muted);
  min-width:52px;padding-top:2px}
.entry-codes{font-family:var(--mono);font-size:12px;font-weight:700;
  color:var(--text);flex:1;line-height:1.7}
.entry-del{font-size:16px;background:none;border:none;color:var(--muted);
  cursor:pointer;padding:2px 4px;line-height:1}

/* ── CONFIDENCE BADGE ── */
.conf-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px}
.conf-high{background:rgba(62,207,142,.15);color:var(--green);border:1px solid rgba(62,207,142,.3)}
.conf-med {background:rgba(123,140,222,.15);color:var(--accent);border:1px solid rgba(123,140,222,.3)}
.conf-low {background:rgba(245,166,35,.15);color:var(--gold);border:1px solid rgba(245,166,35,.3)}
.conf-none{background:rgba(107,107,128,.15);color:var(--muted);border:1px solid var(--border)}

/* ── PAIRS ── */
.pair-row{display:flex;align-items:center;gap:8px;padding:5px 0;
  border-bottom:1px solid var(--border)}
.pair-codes{font-family:var(--mono);font-size:13px;font-weight:900;color:var(--accent)}
.pair-meta{font-size:11px;color:var(--muted);flex:1}
.pair-pct{font-size:12px;font-family:var(--mono);font-weight:700}

/* ── LEARNER ALERT ── */
#learner-alert{display:none;margin-bottom:10px}
.learner-card{background:rgba(62,207,142,.08);border:1px solid rgba(62,207,142,.3);
  border-radius:var(--radius);padding:10px 12px}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;
  display:none;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:20px 20px 0 0;
  padding:20px 16px calc(20px + var(--safe-b));width:100%;max-width:480px;
  max-height:80vh;overflow-y:auto}
.modal-title{font-size:15px;font-weight:700;margin-bottom:14px}

/* ── TOAST ── */
#toast{position:fixed;bottom:calc(68px + var(--safe-b));left:50%;
  transform:translateX(-50%) translateY(20px);
  background:var(--surface3);border:1px solid var(--border);
  border-radius:20px;padding:8px 18px;font-size:12px;font-weight:600;
  opacity:0;transition:all .25s;z-index:200;white-space:nowrap;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.warn{background:rgba(245,166,35,.2);border-color:var(--gold);color:var(--gold)}
#toast.ok{background:rgba(62,207,142,.2);border-color:var(--green);color:var(--green)}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-icon{font-size:36px;margin-bottom:10px}
.empty p{font-size:13px;line-height:1.6}

/* ── ALERTS ── */
.alert{border-radius:10px;padding:10px 12px;font-size:12px;margin-bottom:8px}
.alert-ok{background:rgba(62,207,142,.1);border:1px solid rgba(62,207,142,.3);color:var(--green)}
.alert-warn{background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.3);color:var(--gold)}
.alert-info{background:rgba(123,140,222,.1);border:1px solid rgba(123,140,222,.3);color:var(--accent)}
.alert-err{background:rgba(229,83,83,.1);border:1px solid rgba(229,83,83,.3);color:var(--red)}

/* ── PROGRESS ── */
.progress-track{height:4px;background:var(--surface3);border-radius:2px;overflow:hidden;margin:6px 0}
.progress-fill{height:100%;background:var(--green);border-radius:2px;transition:width .2s}

/* ── MISC ── */
.mono{font-family:var(--mono)}
.muted{color:var(--muted)}
.green{color:var(--green)}
.gold{color:var(--gold)}
.red{color:var(--red)}
.accent{color:var(--accent)}
hr.divider{border:none;border-top:1px solid var(--border);margin:10px 0}
</style>
</head>

// \u2500\u2500 ENGINE \u2500\u2500
var DEFAULT_WEIGHTS = {
freq:     0.12,
recency:  0.11,
streak:   0.09,
bias:     0.07,
cooccur:  0.12,
interval: 0.06,
dow:      0.03,
cycle:    0.09,
overdue:  0.06,
qtydom:   0.09,
qtystreak:0.06,
momentum: 0.14
};
var SIGNAL_KEYS = ['freq','recency','streak','bias','cooccur','interval','dow','cycle','overdue','qtydom','qtystreak','momentum'];
var SIGNAL_NAMES = {
freq:'Frequency', recency:'Recency', streak:'Streak', bias:'Pred. accuracy',
cooccur:'Co-occur', interval:'Interval', dow:'Day-of-wk', cycle:'Cycle',
overdue:'Overdue', qtydom:'Qty dominance', qtystreak:'Qty streak',
momentum:'Momentum'
};
var SIGNAL_COLORS = {
freq:'var(--sig-freq)', recency:'var(--sig-recency)', streak:'var(--sig-streak)',
bias:'var(--sig-bias)', cooccur:'var(--sig-cooccur)', interval:'var(--sig-interval)',
dow:'var(--sig-dow)', cycle:'var(--sig-cycle)', overdue:'var(--sig-overdue)',
qtydom:'var(--sig-qtydom)', qtystreak:'var(--sig-qtystreak)',
momentum:'var(--sig-momentum)'
};
var SIGNAL_VERSION = '2';
var MOMENTUM_WINDOW = 8;
var LEARNING_RATE = 0.03;
var WEIGHT_MIN = 0.02;
var WEIGHT_MAX = 0.50;
var GRAD_MIN_N = 5;
var GRAD_Z_THRESHOLD = 1.2;
var OBS_MIN_N = 3;
var OBS_MAX_N = 10;
var OBS_Z_THRESHOLD = 1.5;
var OBS_SOFT_PENALTY = 0.85;
var OBS_HARD_PENALTY = 0.60;
var OBS_RECOVER_HITS = 2;function buildFreqMap(entries){
var f={},n=entries.length;
if(!n) return f;
entries.forEach(function(e){e.codes.forEach(function(c){f[c]=(f[c]||0)+1;});});
// Normalise to appearance rate (0\u20131) \u2014 independent of history length
Object.keys(f).forEach(function(c){f[c]=f[c]/n;});
return f;
}

function buildWeightedScore(entries){
// Exponential decay recency \u2014 code last appearing 1 refill ago scores ~2\u00D7 more than
// code appearing 3 refills ago, ~4\u00D7 more than 5 refills ago.
// This is a tighter prior than linear weighting, but the learning loop
// (codeSignalLifts) will increase or decrease recency weight per shop/code
// if evidence shows recency actually predicts hits here.
var s={},n=entries.length;
var HALF_LIFE=3; // halves every 3 refills
entries.forEach(function(e,i){
var age=n-1-i; // 0 = most recent
var w=Math.pow(0.5,age/HALF_LIFE);
e.codes.forEach(function(c){s[c]=(s[c]||0)+w;});
});
// Normalise to 0\u20131
var maxS=Math.max.apply(null,Object.values(s).concat([0.001]));
Object.keys(s).forEach(function(c){s[c]=s[c]/maxS;});
return s;
}

function buildStreaks(entries){
var st={};
var rev=entries.slice().reverse();
var allCodes=Array.from(new Set(entries.reduce(function(a,e){return a.concat(e.codes);},[]) ));
allCodes.forEach(function(c){
var run=0; // consecutive appearances
for(var i=0;i<rev.length;i++){
var cnt=rev[i].codes.filter(function(x){return x===c;}).length;
if(cnt>0) run++;
else break;
}
// Decay: 1st appearance=1.0, 2nd=0.65, 3rd=0.35, 4th+=0.15
// Rationale: recent appearance is signal; repeated runs are not predictive for random refills
if(run===1) st[c]=1.0;
else if(run===2) st[c]=0.65;
else if(run===3) st[c]=0.35;
else if(run>3) st[c]=0.15;
});
return st;
}

function buildBias(predictions){
var bias={};
var resolved=predictions.filter(function(p){return p.status!=='pending'&&p.outcome;});
if(!resolved.length) return bias;
var n=resolved.length;
var HALF_LIFE=6; // halves every 6 predictions \u2014 older history fades
var stats={};
resolved.forEach(function(p,idx){
var age=n-1-idx;
var rw=Math.pow(0.5,age/HALF_LIFE);
Object.keys(p.outcome).forEach(function(code){
if(!stats[code]) stats[code]={hits:0,total:0};
var isHit=p.outcome[code]==='hit'?1:0;
stats[code].hits+=isHit*rw;
stats[code].total+=rw;
});
});
Object.keys(stats).forEach(function(code){
bias[code]=stats[code].total>0?stats[code].hits/stats[code].total:0.5;
});
return bias;
}

function buildCooccurrence(entries){
var pairCount={}, codeCount={};
entries.forEach(function(e){
var unique=Array.from(new Set(e.codes));
unique.forEach(function(c){ codeCount[c]=(codeCount[c]||0)+1; });
for(var i=0;i<unique.length;i++){
for(var j=i+1;j<unique.length;j++){
var a=unique[i],b=unique[j];
var key=a<b?a+'|'+b:b+'|'+a;
pairCount[key]=(pairCount[key]||0)+1;
}
}
});
var coScore={};
Object.keys(pairCount).forEach(function(key){
var parts=key.split('|'), a=parts[0], b=parts[1], n=pairCount[key];
var rateAB=codeCount[a]>0?n/codeCount[a]:0;
var rateBA=codeCount[b]>0?n/codeCount[b]:0;
coScore[b]=(coScore[b]||0)+rateAB;
coScore[a]=(coScore[a]||0)+rateBA;
});
return coScore;
}

function buildTightCooccurrence(entries){
var pairCount={}, codeCount={};
entries.forEach(function(e){
var unique=Array.from(new Set(e.codes));
unique.forEach(function(c){ codeCount[c]=(codeCount[c]||0)+1; });
for(var i=0;i<unique.length;i++){
for(var j=i+1;j<unique.length;j++){
var a=unique[i],b=unique[j];
var key=a<b?a+'|'+b:b+'|'+a;
pairCount[key]=(pairCount[key]||0)+1;
}
}
});
var tightScore={};
Object.keys(pairCount).forEach(function(key){
var parts=key.split('|'), a=parts[0], b=parts[1], n=pairCount[key];
var rateAB=codeCount[a]>0?n/codeCount[a]:0;
var rateBA=codeCount[b]>0?n/codeCount[b]:0;
if(rateAB>=0.80 && rateBA>=0.80){
tightScore[a]=(tightScore[a]||0)+rateBA;
tightScore[b]=(tightScore[b]||0)+rateAB;
}
});
return tightScore;
}

function buildIntervalRegularity(entries){
var reg={};
var sorted=entries.slice().sort(function(a,b){return a.date.localeCompare(b.date);});
var allCodes=Array.from(new Set(entries.reduce(function(a,e){return a.concat(e.codes);},[]) ));
allCodes.forEach(function(c){
var appearances=[];
sorted.forEach(function(e,i){
if(e.codes.indexOf(c)>-1) appearances.push(i); // refill index, not date
});
if(appearances.length<3){ reg[c]=0; return; }
// Gaps in refill counts (1 = appeared every refill, 2 = every other, etc.)
var gaps=[];
for(var i=1;i<appearances.length;i++){
gaps.push(appearances[i]-appearances[i-1]);
}
var mean=gaps.reduce(function(a,b){return a+b;},0)/gaps.length;
var variance=gaps.reduce(function(a,b){return a+Math.pow(b-mean,2);},0)/gaps.length;
var cv=mean>0?Math.sqrt(variance)/mean:1; // coefficient of variation
// Low CV = regular intervals = high regularity score
// cv=0 &#x2192; perfect regularity (score=1), cv=1 &#x2192; random (score=0)
reg[c]=Math.max(0, 1-cv);
});
return reg;
}

function buildDowPattern(entries){
var dow={};
// Use the date of the LAST entry \u2014 that's what we're predicting from,
// not today which may be days after the last refill was entered
var sorted=entries.slice().sort(function(a,b){return a.date.localeCompare(b.date);});
var lastDate=sorted.length?sorted[sorted.length-1].date:null;
var refillDow=lastDate?new Date(lastDate+'T12:00:00').getDay():new Date().getDay();
entries.forEach(function(e){
var d=new Date(e.date+'T12:00:00').getDay();
var unique=Array.from(new Set(e.codes));
unique.forEach(function(c){
if(!dow[c]) dow[c]=new Array(7).fill(0);
dow[c][d]++;
});
});
var score={};
Object.keys(dow).forEach(function(c){
var counts=dow[c];
var total=counts.reduce(function(a,b){return a+b;},0);
if(total===0){ score[c]=0.5; return; }
var targetRate=counts[refillDow]/total;
var expected=1/7;
score[c]=Math.min(1, targetRate/expected/7);
});
return score;
}

function buildCycleScore(entries){
var sorted=entries.slice().sort(function(a,b){return a.date.localeCompare(b.date);});
var n=sorted.length;
var allCodes=Array.from(new Set(entries.reduce(function(a,e){return a.concat(e.codes);},[]) ));
var cycleScore={};
allCodes.forEach(function(c){
var seq=sorted.map(function(e){return e.codes.indexOf(c)>-1?1:0;});
if(seq.length<6){ cycleScore[c]=0; return; }
var bestScore=0;
// Test periods 2\u20137 (was 2\u20134) \u2014 catches longer cycles
[2,3,4,5,6,7].forEach(function(period){
if(seq.length<period*2) return; // need at least 2 full cycles
var correct=0,total=0;
for(var i=period;i<seq.length;i++){
var pred=seq[i-period];
if(pred===seq[i]) correct++;
total++;
}
var accuracy=total>0?correct/total:0;
// Weight score by how predictable the pattern is
// A period-2 cycle with 90% accuracy scores higher than
// a period-7 cycle with 70% accuracy (longer = less reliable prior)
var periodPenalty=1-(period-2)*0.05; // slight discount for longer periods
var score=(accuracy-0.5)*2*periodPenalty;
if(score>bestScore) bestScore=score;
});
cycleScore[c]=Math.max(0,Math.min(1,bestScore));
});
return cycleScore;
}

function buildOverdueScore(entries){
// Overdue: code is absent longer than its expected interval.
// Two changes vs original:
// 1. Just-appeared penalty \u2014 if code appeared in last refill, overdue=0
//    (it just came, can't be overdue yet regardless of interval)
// 2. Tighter appearance rate threshold (20% &#x2192; any regular code qualifies)
// The learning loop will lift overdue weight for shops where cycle patterns
// are genuine, and suppress it for shops where overdue doesn't predict hits.
var sorted=entries.slice().sort(function(a,b){return a.date.localeCompare(b.date);});
var n=sorted.length;
var lastEntry=sorted[n-1];
var allCodes=Array.from(new Set(entries.reduce(function(a,e){return a.concat(e.codes);},[])));
var overdue={};
allCodes.forEach(function(c){
var appearances=sorted.filter(function(e){return e.codes.indexOf(c)>-1;});
if(appearances.length<3){ overdue[c]=0; return; }
// Just-appeared penalty: if code was in the most recent refill, it can't be overdue
if(lastEntry&&lastEntry.codes.indexOf(c)>-1){ overdue[c]=0; return; }
var appRate=appearances.length/n;
if(appRate<0.15){ overdue[c]=0; return; } // lowered from 0.3 \u2014 more codes qualify
var expectedInterval=1/appRate;
var refillsSinceLast=0;
for(var i=sorted.length-1;i>=0;i--){
if(sorted[i].codes.indexOf(c)>-1) break;
refillsSinceLast++;
}
var overdueRatio=refillsSinceLast/expectedInterval;
// Only score when clearly overdue (>80% of interval elapsed, not just 50%)
// Tighter threshold reduces false positives
overdue[c]=Math.min(1, Math.max(0, (overdueRatio-0.8)*5));
});
return overdue;
}

function buildQtyDominance(entries){
if(!entries.length) return {};
var avgSlotsPerRefill = entries.reduce(function(a,e){return a+e.codes.length;},0)/entries.length;
if(avgSlotsPerRefill===0) return {};
var totals={}, apps={};
entries.forEach(function(e){
var cnt={};
e.codes.forEach(function(c){cnt[c]=(cnt[c]||0)+1;});
Object.keys(cnt).forEach(function(c){
totals[c]=(totals[c]||0)+cnt[c];
apps[c]=(apps[c]||0)+1;
});
});
var allCodes=Object.keys(totals);
var poolAvg = allCodes.length>0
? entries.reduce(function(a,e){return a+e.codes.length;},0) / allCodes.length / entries.length
: 1;
var score={};
allCodes.forEach(function(c){
var avgQty = totals[c]/apps[c];
var appearRate = apps[c]/entries.length;
var weightedAvg = avgQty * appearRate;
var lift = poolAvg>0 ? (weightedAvg - poolAvg) / poolAvg : 0;
score[c] = Math.max(0, Math.min(1, 0.5 + lift));
});
return score;
}

function buildQtyStreak(entries){
var rev=entries.slice().reverse();
var allCodes=Array.from(new Set(entries.reduce(function(a,e){return a.concat(e.codes);},[])));
var score={};
allCodes.forEach(function(c){
var streak=0;
for(var i=0;i<rev.length;i++){
var cnt=rev[i].codes.filter(function(x){return x===c;}).length;
if(cnt>=2) streak++;
else break;
}
score[c] = Math.min(1, streak/4);
});
return score;
}

function buildQtyTrend(entries){
var trend={};
var allCodes=Array.from(new Set(entries.reduce(function(a,e){return a.concat(e.codes);},[])));
allCodes.forEach(function(c){
var appearances=entries.filter(function(e){return e.codes.includes(c);});
if(appearances.length<4){ trend[c]=1.0; return; }
var half=Math.floor(appearances.length/2);
var earlier=appearances.slice(0,half);
var later=appearances.slice(half);
function avgQty(set){
var total=set.reduce(function(a,e){return a+e.codes.filter(function(x){return x===c;}).length;},0);
return total/set.length;
}
var qEarly=avgQty(earlier), qLate=avgQty(later);
if(qEarly===0) { trend[c]=1.0; return; }
trend[c]=Math.min(1.20, Math.max(0.80, qLate/qEarly));
});
return trend;
}

function buildMomentumScore(entries){
var n = entries.length;
var sorted = entries.slice().sort(function(a,b){return a.date.localeCompare(b.date);});
var w = Math.min(MOMENTUM_WINDOW, Math.floor(n/2));
if(w < 2) return {};
var recent   = sorted.slice(n-w);
var preceding= sorted.slice(Math.max(0,n-2*w), n-w);
var allCodes = Array.from(new Set(entries.reduce(function(a,e){return a.concat(e.codes);},[])));
var raw={};
allCodes.forEach(function(c){
var rRate = recent.filter(function(e){return e.codes.indexOf(c)>-1;}).length / recent.length;
var pRate = preceding.length>0
? preceding.filter(function(e){return e.codes.indexOf(c)>-1;}).length / preceding.length
: 0;
raw[c] = rRate - pRate;
});
var scores={};
allCodes.forEach(function(c){ scores[c] = Math.max(0, Math.min(1, 0.5 + raw[c])); });
return {scores:scores, raw:raw};
}

function buildMissStreakPenalty(predictions, letter){
var penalty={};
if(letter){
db=loadDB();
var obs=shopObs(letter);
Object.keys(obs).forEach(function(code){
penalty[code]=obs[code].penaltyApplied!==undefined?obs[code].penaltyApplied:1.0;
});
return penalty;
}
var resolved=predictions.filter(function(p){return p.status!=='pending'&&p.outcome;});
if(!resolved.length) return {};
var recent=resolved.slice().reverse();
var codeMissStreak={};
recent.forEach(function(p){
Object.keys(p.outcome).forEach(function(c){
if(codeMissStreak[c]===undefined) codeMissStreak[c]=0;
if(p.outcome[c]==='miss') codeMissStreak[c]++;
else codeMissStreak[c]=0;
});
});
Object.keys(codeMissStreak).forEach(function(c){
var streak=codeMissStreak[c];
penalty[c]=streak===0?1.0:streak===1?OBS_SOFT_PENALTY:streak===2?0.70:OBS_HARD_PENALTY;
});
return penalty;
}

function buildAppearanceRate(entries){
var r={},n=entries.length;
entries.forEach(function(e){
var seen={};
e.codes.forEach(function(c){if(!seen[c]){seen[c]=true;r[c]=(r[c]||0)+1;}});
});
Object.keys(r).forEach(function(k){r[k]=r[k]/n;});
return r;
}

function buildAvgQty(entries){
var totals={},apps={};
entries.forEach(function(e){
var cnt={};
e.codes.forEach(function(c){cnt[c]=(cnt[c]||0)+1;});
Object.keys(cnt).forEach(function(c){totals[c]=(totals[c]||0)+cnt[c];apps[c]=(apps[c]||0)+1;});
});
var avg={};
Object.keys(totals).forEach(function(c){avg[c]=totals[c]/apps[c];});
return avg;
}

function buildCombinedScore(entries, predictions, letter){
var freq      = buildFreqMap(entries);
var rec       = buildWeightedScore(entries);
var str       = buildStreaks(entries);
var bias      = buildBias(predictions||[]);
var cooc      = buildCooccurrence(entries);
var tightCooc = buildTightCooccurrence(entries);
var intReg    = buildIntervalRegularity(entries);
var dow       = buildDowPattern(entries);
var qtrend    = buildQtyTrend(entries);
var missPen   = buildMissStreakPenalty(predictions||[], letter||null);
var cycle     = buildCycleScore(entries);
var overdue   = buildOverdueScore(entries);
var qtydom    = buildQtyDominance(entries);
var qtystreak = buildQtyStreak(entries);
var momResult = entries.length>=4 ? buildMomentumScore(entries) : {scores:{},raw:{}};
var momentum  = momResult.scores||{};
var regime    = entries.length>=8 ? detectRegimeShift(entries) : {shifting:false,overlapScore:1};
var w = letter ? getWeights(letter) : Object.assign({},DEFAULT_WEIGHTS);
var effectiveW = Object.assign({},w);
var resolved = (predictions||[]).filter(function(p){return p.status!=='pending'&&p.outcome;});
if(resolved.length>=5){
var signalLifts={};
var sigTotal=0;
SIGNAL_KEYS.forEach(function(k){
var liftSum=0, liftCount=0;
var allPredCodes=Array.from(new Set(resolved.reduce(function(a,p){return a.concat(p.predictedCodes);},[]) ));
allPredCodes.forEach(function(c){
var corr=buildSignalOutcomeCorrelation(k,c,predictions);
if(corr&&corr.resolved>=2){liftSum+=corr.lift;liftCount++;}
});
signalLifts[k]=liftCount>0?liftSum/liftCount:0;
});
var maxLift=Math.max.apply(null,Object.values(signalLifts).map(Math.abs).concat([0.001]));
var liftW={};
SIGNAL_KEYS.forEach(function(k){
var lift=signalLifts[k];
liftW[k]=lift>0?Math.max(WEIGHT_MIN,lift/maxLift*(w[k]||DEFAULT_WEIGHTS[k])*2)
:WEIGHT_MIN;
});
var liftSum2=SIGNAL_KEYS.reduce(function(s,k){return s+liftW[k];},0);
if(liftSum2>0) SIGNAL_KEYS.forEach(function(k){liftW[k]=liftW[k]/liftSum2;});
SIGNAL_KEYS.forEach(function(k){
effectiveW[k]=0.60*(w[k]||DEFAULT_WEIGHTS[k]) + 0.40*liftW[k];
});
var blendTotal=SIGNAL_KEYS.reduce(function(s,k){return s+(effectiveW[k]||0);},0);
if(blendTotal>0) SIGNAL_KEYS.forEach(function(k){effectiveW[k]=(effectiveW[k]||0)/blendTotal;});
}
if(regime.shifting){
var freqBoost  = Math.max(0, 1-regime.overlapScore);
effectiveW.freq     = Math.max(WEIGHT_MIN, effectiveW.freq    * (1-freqBoost));
effectiveW.recency  = Math.min(WEIGHT_MAX, effectiveW.recency * (1+freqBoost*0.5));
effectiveW.momentum = Math.min(WEIGHT_MAX,(effectiveW.momentum||DEFAULT_WEIGHTS.momentum)*(1+freqBoost));
var rTotal=SIGNAL_KEYS.reduce(function(s,k){return s+(effectiveW[k]||0);},0);
if(rTotal>0) SIGNAL_KEYS.forEach(function(k){effectiveW[k]=(effectiveW[k]||0)/rTotal;});
}
var shopConf = 0.5;
if(resolved.length>=3){
var hitTotal=0,hitCount=0;
resolved.slice(-8).forEach(function(p){
Object.values(p.outcome).forEach(function(v){hitTotal++;if(v==='hit')hitCount++;});
});
shopConf = hitTotal>0 ? hitCount/hitTotal : 0.5;
}
var compressionFactor = 1.0 + (1.0-shopConf)*1.5;
var all=Array.from(new Set(entries.reduce(function(a,e){return a.concat(e.codes);},[])));
var mF  = Math.max.apply(null,Object.values(freq).concat([1]));
var mR  = Math.max.apply(null,Object.values(rec).concat([1]));
var mS  = Math.max.apply(null,Object.values(str).concat([1]));
var mC  = Math.max.apply(null,Object.values(cooc).concat([1]));
var mTC = Math.max.apply(null,Object.values(tightCooc).concat([1]));
var scores={}, snapshots={};
all.forEach(function(c){
var bVal  = bias[c]!==undefined ? bias[c] : 0.5;
var boost = Math.max(0,(bVal-0.5)*2);
var coocNorm = ((cooc[c]||0)/mC + (tightCooc[c]||0)/mTC*2)/3;
var sig = {
freq:      (freq[c]||0)/mF,
recency:   (rec[c]||0)/mR,
streak:    (str[c]||0)/mS,
bias:      boost,
cooccur:   coocNorm,
interval:  (intReg[c]||0),
dow:       (dow[c]||0),
cycle:     (cycle[c]||0),
overdue:   (overdue[c]||0),
qtydom:    (qtydom[c]||0),
qtystreak: (qtystreak[c]||0),
momentum:  (momentum[c]||0.5)
};
var base =
sig.freq      * effectiveW.freq      +
sig.recency   * effectiveW.recency   +
sig.streak    * effectiveW.streak    +
sig.bias      * effectiveW.bias      +
sig.cooccur   * effectiveW.cooccur   +
sig.interval  * effectiveW.interval  +
sig.dow       * effectiveW.dow       +
sig.cycle     * effectiveW.cycle     +
sig.overdue   * effectiveW.overdue   +
sig.qtydom    * effectiveW.qtydom    +
sig.qtystreak * effectiveW.qtystreak +
sig.momentum  * (effectiveW.momentum||DEFAULT_WEIGHTS.momentum);
// GAP 1: Per-code signal blending
// Blend shop-level effectiveW (60%) with per-code lift from codeSignalLifts (40%)
// Partial pooling: codes with little history stay close to shop weights
// This lets model learn "cycle works for code 07 but not 34 in this shop"
if(letter){
var csl=(db.shops[letter]&&db.shops[letter].codeSignalLifts)||{};
var cLifts=csl[c];
if(cLifts&&cLifts.counts){
var codeW={};
var hasEvidence=false;
SIGNAL_KEYS.forEach(function(k){
var cnt=cLifts.counts[k]||0;
if(cnt>=2){
hasEvidence=true;
var normLift=Math.max(-1,Math.min(1,(cLifts.lifts[k]||0)/cnt));
var evidScale=Math.min(1,cnt/5); // need 5 observations for full effect
var cShop=effectiveW[k]||DEFAULT_WEIGHTS[k];
var cAdj=Math.max(0.01,Math.min(0.50,cShop+normLift*0.20*evidScale));
// 60% shop weight + 40% code-specific adjustment
codeW[k]=0.60*cShop+0.40*cAdj;
} else {
codeW[k]=effectiveW[k]||DEFAULT_WEIGHTS[k];
}
});
if(hasEvidence){
// Renormalise code weights
var cSum=SIGNAL_KEYS.reduce(function(s,k){return s+(codeW[k]||0);},0);
if(cSum>0) SIGNAL_KEYS.forEach(function(k){codeW[k]=(codeW[k]||0)/cSum;});
// Recompute base with per-code weights
base=
sig.freq*codeW.freq+sig.recency*codeW.recency+sig.streak*codeW.streak+
sig.bias*codeW.bias+sig.cooccur*codeW.cooccur+sig.interval*codeW.interval+
sig.dow*codeW.dow+sig.cycle*codeW.cycle+sig.overdue*codeW.overdue+
sig.qtydom*codeW.qtydom+sig.qtystreak*codeW.qtystreak+
sig.momentum*(codeW.momentum||DEFAULT_WEIGHTS.momentum);
}
}
}
var qt = qtrend[c]||1.0;
var mp = missPen[c]!==undefined ? missPen[c] : 1.0;
var raw = base * qt * mp;
scores[c]    = raw;
snapshots[c] = sig;
});
if(compressionFactor > 1.0 && Object.keys(scores).length > 1){
var maxRaw=Math.max.apply(null,Object.values(scores).concat([0.001]));
Object.keys(scores).forEach(function(c){
var norm=scores[c]/maxRaw;
var compressed=Math.pow(norm, compressionFactor);
scores[c]=compressed*maxRaw;
});
}
return {scores:scores, snapshots:snapshots, weights:effectiveW, regime:regime,
momentum:momResult.raw||{}, shopConf:shopConf,
signalLifts:resolved.length>=5?signalLifts:null};
}

function buildSignalConsensus(code, snap, weights, effectiveW){
var yes=0,no=0,neutral=0;
var yesSignals=[],noSignals=[];
var w=effectiveW||weights||DEFAULT_WEIGHTS;
var contributions=[];
SIGNAL_KEYS.forEach(function(k){
var val=snap[k]||0;
var wt=w[k]||DEFAULT_WEIGHTS[k]||0;
var contrib=val*wt;
contributions.push({k:k,val:val,wt:wt,contrib:contrib});
if(val>=0.6)      { yes++; }
else if(val<=0.35){ no++;  }
else              { neutral++; }
});
// Sort by weighted contribution \u2014 top named signals are the ones actually driving the score
var sorted=contributions.slice().sort(function(a,b){return b.contrib-a.contrib;});
yesSignals=sorted.filter(function(s){return s.val>=0.6;}).map(function(s){return s.k;});
noSignals=sorted.filter(function(s){return s.val<=0.35;}).map(function(s){return s.k;});
var total=yes+no+neutral;
var score=total>0?Math.round((yes-no*0.5)/total*100):50;
score=Math.max(0,Math.min(100,score+50));
var label=score>=75?'STRONG':score>=55?'MODERATE':score>=40?'MIXED':'WEAK';
var col=score>=75?'var(--green)':score>=55?'var(--accent)':score>=40?'var(--gold)':'var(--red)';
return {yes:yes,no:no,neutral:neutral,score:score,label:label,col:col,
yesSignals:yesSignals,noSignals:noSignals};
}

function buildSignalOutcomeCorrelation(key, code, preds){
var resolved = preds.filter(function(p){
return p.status!=='pending' && p.outcome && p.predictedCodes.indexOf(code)>-1 && p.signalSnapshot && p.signalSnapshot[code];
});
if(resolved.length < 2) return null;
var values = resolved.map(function(p){ return p.signalSnapshot[code][key]||0; });
values.sort(function(a,b){return a-b;});
var median = values[Math.floor(values.length/2)];
var highHits=0, highTotal=0, lowHits=0, lowTotal=0;
resolved.forEach(function(p){
var v = p.signalSnapshot[code][key]||0;
var hit = p.outcome[code]==='hit' ? 1 : 0;
if(v >= median){ highHits+=hit; highTotal++; }
else           { lowHits+=hit;  lowTotal++;  }
});
var highRate = highTotal>0 ? highHits/highTotal : 0;
var lowRate  = lowTotal>0  ? lowHits/lowTotal   : 0;
var lift     = highRate - lowRate;
return {
resolved:  resolved.length,
highRate:  highRate,
lowRate:   lowRate,
lift:      lift,
reliable:  lift >= 0.25,
noisy:     Math.abs(lift) < 0.10,
misleading: lift <= -0.15
};
}

function normaliseWeights(w){
var total = SIGNAL_KEYS.reduce(function(s,k){return s+(w[k]||0);},0);
if(total===0) return Object.assign({},DEFAULT_WEIGHTS);
var out={};
SIGNAL_KEYS.forEach(function(k){
out[k] = Math.min(WEIGHT_MAX, Math.max(WEIGHT_MIN, (w[k]||0)/total));
});
var total2 = SIGNAL_KEYS.reduce(function(s,k){return s+out[k];},0);
SIGNAL_KEYS.forEach(function(k){ out[k]=out[k]/total2; });
return out;
}

if(qtyMatchCases>=MIN_CASES){
