function buildCooccurImplications(entries, top5Codes){
if(!entries.length||!top5Codes.length) return [];
var pairCount={}, codeCount={};
entries.forEach(function(e){
var unique=Array.from(new Set(e.codes));
unique.forEach(function(c){codeCount[c]=(codeCount[c]||0)+1;});
for(var i=0;i<unique.length;i++){
for(var j=i+1;j<unique.length;j++){
var a=unique[i],b=unique[j];
var key=a<b?a+'|'+b:b+'|'+a;
pairCount[key]=(pairCount[key]||0)+1;
}
}
});
var implications=[];
var seen=new Set(top5Codes);
top5Codes.forEach(function(predictedCode){
Object.keys(pairCount).forEach(function(key){
var parts=key.split('|');
var a=parts[0],b=parts[1];
var isA=(a===predictedCode),isB=(b===predictedCode);
if(!isA&&!isB) return;
var partner=isA?b:a;
if(seen.has(partner)) return;
var n=pairCount[key];
var baseCode=predictedCode;
var rateGivenPredicted=codeCount[baseCode]>0?n/codeCount[baseCode]:0;
var rateGivenPartner  =codeCount[partner]>0?n/codeCount[partner]:0;
var isTight=rateGivenPredicted>=0.75&&rateGivenPartner>=0.75;
if(rateGivenPredicted>=0.55){
seen.add(partner);
implications.push({
impliedCode:partner,
via:predictedCode,
rate:Math.round(rateGivenPredicted*100),
reverseRate:Math.round(rateGivenPartner*100),
tight:isTight,
pairCount:n,
totalPredicted:codeCount[predictedCode]||0
});
}
});
});
implications.sort(function(a,b){
if(a.tight!==b.tight) return a.tight?-1:1;
return b.rate-a.rate;
});
return implications.slice(0,8);
}

function detectRegimeShift(entries){
var n = entries.length;
if(n < 8) return {shifting:false, overlapScore:1, note:'Insufficient data'};
var sorted = entries.slice().sort(function(a,b){return a.date.localeCompare(b.date);});
var w = Math.min(MOMENTUM_WINDOW, Math.floor(n/2));
var recent    = sorted.slice(n-w);
var historical= sorted;
function topCodes(set, topN){
var freq={};
set.forEach(function(e){e.codes.forEach(function(c){freq[c]=(freq[c]||0)+1;});});
return Object.entries(freq).sort(function(a,b){return b[1]-a[1];}).slice(0,topN).map(function(x){return x[0];});
}
var topN = Math.min(8, Math.ceil(n/3));
var recentTop = topCodes(recent, topN);
var histTop   = topCodes(historical, topN);
var overlap = recentTop.filter(function(c){return histTop.indexOf(c)>-1;}).length;
var overlapScore = overlap / topN;
var shifting = overlapScore < 0.6;
var emerging = recentTop.filter(function(c){return histTop.indexOf(c)===-1;});
var fading   = histTop.filter(function(c){return recentTop.indexOf(c)===-1;});
var note = shifting
? 'Pattern shift detected \u2014 '+(emerging.length?emerging.join(', ')+' emerging':'new codes rising')
+(fading.length?' &#xB7; '+fading.join(', ')+' fading':'')
+'. Recency and momentum prioritised.'
: 'Stable \u2014 recent pattern consistent with history ('+Math.round(overlapScore*100)+'% overlap).';
return {shifting:shifting, overlapScore:overlapScore,
recentDominant:recentTop, historicalDominant:histTop,
emerging:emerging, fading:fading, note:note};
}

function buildHistoricalSimilarity(entries, topN){
topN=topN||3;
var sorted=entries.slice().sort(function(a,b){return a.date.localeCompare(b.date);});
var n=sorted.length;
var windowSize=Math.min(3,Math.floor(n/3));
if(n<windowSize*2+1) return [];
var currentSeq=sorted.slice(n-windowSize);
var currentCodes=new Set(currentSeq.reduce(function(a,e){return a.concat(e.codes);},[]) );
var matches=[];
for(var i=0;i<=n-windowSize-1;i++){
var candidateSeq=sorted.slice(i,i+windowSize);
var candidateCodes=new Set(candidateSeq.reduce(function(a,e){return a.concat(e.codes);},[]) );
var intersection=0;
currentCodes.forEach(function(c){if(candidateCodes.has(c))intersection++;});
var union=currentCodes.size+candidateCodes.size-intersection;
var similarity=union>0?intersection/union:0;
if(similarity>=0.5&&i+windowSize<n){
var followingEntry=sorted[i+windowSize];
var followingCodes=Array.from(new Set(followingEntry.codes));
matches.push({
startIdx:i+1,
endIdx:i+windowSize,
similarity:Math.round(similarity*100),
candidateDates:candidateSeq.map(function(e){return e.date.slice(5);}).join('&#x2192;'),
followingDate:followingEntry.date.slice(5),
followingCodes:followingCodes,
commonCodes:followingCodes.filter(function(c){return currentCodes.has(c);}),
newCodes:followingCodes.filter(function(c){return !currentCodes.has(c);})
});
}
}
matches.sort(function(a,b){return b.similarity-a.similarity;});
return matches.slice(0,topN);
}



function buildScoreThreshold(code, entries, preds){
var resolved = preds.filter(function(p){
return p.status!=='pending' && p.outcome && p.predictedCodes.indexOf(code)>-1 && p.scores;
});
if(resolved.length < 4) return null;
var maxS = Math.max.apply(null, resolved.map(function(p){
return Math.max.apply(null, Object.values(p.scores||{}).concat([0.001]));
}));
var pairs = resolved.map(function(p){
var normScore = Math.round((p.scores[code]||0)/maxS*100);
return {score:normScore, hit:p.outcome[code]==='hit'?1:0};
}).sort(function(a,b){return a.score-b.score;});
var threshold = null;
var midIdx = Math.floor(pairs.length/2);
for(var i=midIdx;i<pairs.length;i++){
var above = pairs.slice(i);
var aboveHits = above.filter(function(x){return x.hit;}).length;
var aboveRate = aboveHits/above.length;
if(aboveRate >= 0.70 && above.length >= 2){
threshold = pairs[i].score;
break;
}
}
if(threshold === null){
for(var j=midIdx;j<pairs.length;j++){
var ab2 = pairs.slice(j);
var ab2Hits = ab2.filter(function(x){return x.hit;}).length;
if(ab2Hits/ab2.length >= 0.60 && ab2.length >= 2){
threshold = pairs[j].score;
break;
}
}
}
if(threshold === null) threshold = 50;
var above = pairs.filter(function(x){return x.score>=threshold;});
var below = pairs.filter(function(x){return x.score<threshold;});
var aboveHitRate = above.length ? Math.round(above.filter(function(x){return x.hit;}).length/above.length*100) : null;
var belowHitRate = below.length ? Math.round(below.filter(function(x){return x.hit;}).length/below.length*100) : null;
var lift = aboveHitRate!==null && belowHitRate!==null ? aboveHitRate - belowHitRate : 0;
var reliability = resolved.length >= 10 && lift >= 30 ? 'proven'
: resolved.length >= 5  && lift >= 15 ? 'emerging'
: 'insufficient';
var lowScorers = pairs.filter(function(x){return x.score<=30;});
var lowHitRate = lowScorers.length ? Math.round(lowScorers.filter(function(x){return x.hit;}).length/lowScorers.length*100) : null;
var lowScoreHitsNote = lowHitRate!==null && lowHitRate>=40
? 'Note: codes scoring \u226430% still hit '+lowHitRate+'% of the time \u2014 presence/absence pattern may be too random for score to fully predict.'
: null;
return {
thresholdPct: threshold,
hitRateAbove: aboveHitRate,
hitRateBelowThreshold: belowHitRate,
aboveN: above.length,
belowN: below.length,
lift: lift,
reliability: reliability,
totalPreds: resolved.length,
lowScoreHitsNote: lowScoreHitsNote,
message: reliability==='proven'
? 'Threshold at '+threshold+'%: '+aboveHitRate+'% hit rate above vs '+(belowHitRate||0)+'% below. PROVEN reliable.'
: reliability==='emerging'
? 'Threshold at '+threshold+'%: '+aboveHitRate+'% vs '+(belowHitRate||0)+'% \u2014 emerging pattern. Need more predictions.'
: 'Insufficient data for reliable threshold (need 5+ resolved predictions).'
};
}

function buildShopThresholds(entries, preds){
var resolved=preds.filter(function(p){
return p.status!=='pending'&&p.outcome&&p.scores&&p.predictedCodes;
});
if(resolved.length<5) return null;
var maxS=0;
resolved.forEach(function(p){
var m=Math.max.apply(null,Object.values(p.scores).concat([0.001]));
if(m>maxS) maxS=m;
});
var pairs=[];
resolved.forEach(function(p){
var localMax=Math.max.apply(null,Object.values(p.scores).concat([0.001]));
p.predictedCodes.forEach(function(c){
var normScore=Math.round((p.scores[c]||0)/localMax*100);
var hit=p.outcome[c]==='hit'?1:0;
pairs.push({score:normScore,hit:hit,code:c});
});
});
pairs.sort(function(a,b){return a.score-b.score;});
var bands=[];
for(var b=0;b<10;b++){
var lo=b*10,hi=(b+1)*10;
var inBand=pairs.filter(function(x){return x.score>=lo&&x.score<hi;});
if(inBand.length>0){
var hitRate=Math.round(inBand.filter(function(x){return x.hit;}).length/inBand.length*100);
bands.push({lo:lo,hi:hi,n:inBand.length,hitRate:hitRate});
}
}
var shopThreshold=null;
for(var i=bands.length-1;i>=0;i--){
var allAbove=bands.slice(i);
var aboveN=allAbove.reduce(function(a,b){return a+b.n;},0);
var aboveH=allAbove.reduce(function(a,b){return a+Math.round(b.hitRate*b.n/100);},0);
var aboveRate=aboveN>0?Math.round(aboveH/aboveN*100):0;
if(aboveRate>=60&&aboveN>=3){
shopThreshold=bands[i].lo;
}
}
var overallHitRate=Math.round(pairs.filter(function(x){return x.hit;}).length/pairs.length*100);
var deadZone=bands.filter(function(b){
return Math.abs(b.hitRate-overallHitRate)<10&&b.n>=3;
});
return {
bands:bands,
shopThreshold:shopThreshold,
overallHitRate:overallHitRate,
deadZone:deadZone,
totalPairs:pairs.length,
resolvedCount:resolved.length
};
}

function buildSurpriseThreshold(entries, preds){
var resolved=preds.filter(function(p){
return p.status!=='pending'&&p.outcome&&p.scores&&p.actualCodes;
});
if(resolved.length<5) return null;
var surprisePairs=[];
resolved.forEach(function(p){
var localMax=Math.max.apply(null,Object.values(p.scores).concat([0.001]));
var surprises=Array.from(new Set((p.actualCodes||[]).filter(function(c){
return p.predictedCodes.indexOf(c)===-1;
})));
Object.keys(p.scores).forEach(function(c){
if(p.predictedCodes.indexOf(c)>-1) return;
var normScore=Math.round((p.scores[c]||0)/localMax*100);
var appeared=surprises.indexOf(c)>-1?1:0;
surprisePairs.push({score:normScore,appeared:appeared,code:c});
});
});
if(surprisePairs.length<10) return null;
surprisePairs.sort(function(a,b){return a.score-b.score;});
var bands=[];
for(var b=0;b<10;b++){
var lo=b*10,hi=(b+1)*10;
var inBand=surprisePairs.filter(function(x){return x.score>=lo&&x.score<hi;});
if(inBand.length>0){
var appearRate=Math.round(inBand.filter(function(x){return x.appeared;}).length/inBand.length*100);
bands.push({lo:lo,hi:hi,n:inBand.length,appearRate:appearRate});
}
}
var overallSurpriseRate=Math.round(surprisePairs.filter(function(x){return x.appeared;}).length/surprisePairs.length*100);
var surpriseThreshold=null;
for(var i=bands.length-1;i>=0;i--){
var band=bands[i];
if(band.appearRate>=overallSurpriseRate+15&&band.n>=3){
surpriseThreshold=band.lo;
break;
}
}
return {
bands:bands,
surpriseThreshold:surpriseThreshold,
overallSurpriseRate:overallSurpriseRate,
totalPairs:surprisePairs.length,
resolvedCount:resolved.length
};
}

function learnAndStoreThresholds(letter){
db=loadDB();
var entries=shopEntries(letter);
var preds=shopPreds(letter);
var resolved=preds.filter(function(p){return p.status!=='pending'&&p.outcome&&p.scores;});
if(resolved.length<4) return;
var thresholds={};
var allCodes=Array.from(new Set(resolved.reduce(function(a,p){return a.concat(p.predictedCodes);},[]) ));
allCodes.forEach(function(code){
var thresh=buildScoreThreshold(code,entries,preds);
if(thresh&&thresh.reliability!=='insufficient'){
thresholds[code]={
thresholdPct:thresh.thresholdPct,
hitRateAbove:thresh.hitRateAbove,
hitRateBelow:thresh.hitRateBelowThreshold,
aboveN:thresh.aboveN,
belowN:thresh.belowN,
lift:thresh.lift,
reliability:thresh.reliability,
lowScoreHitsNote:thresh.lowScoreHitsNote||null,
learnedAt:new Date().toISOString()
};
}
});
var shopT=buildShopThresholds(entries,preds);
var surpriseT=buildSurpriseThreshold(entries,preds);
db.shops[letter].learnedThresholds={
perCode:thresholds,
shopLevel:shopT?{
threshold:shopT.shopThreshold,
overallHitRate:shopT.overallHitRate,
bands:shopT.bands
}:null,
surpriseLevel:surpriseT?{
threshold:surpriseT.surpriseThreshold,
overallSurpriseRate:surpriseT.overallSurpriseRate,
bands:surpriseT.bands
}:null,
codesLearned:Object.keys(thresholds).length,
resolvedCount:resolved.length,
learnedAt:new Date().toISOString()
};
saveDB(db);
return db.shops[letter].learnedThresholds;
}

function getStoredThreshold(letter, code){
db=loadDB();
var lt=db.shops[letter]&&db.shops[letter].learnedThresholds;
if(lt&&lt.perCode&&lt.perCode[code]) return lt.perCode[code];
return null;
}

function classifyScoreVsThreshold(letter, code, scorePct){
var thresh=getStoredThreshold(letter,code);
if(!thresh) return {zone:'unknown',label:'\u2014',col:'var(--muted)',above:null,thresholdPct:null,confidence:'none'};
var above=scorePct>=thresh.thresholdPct;
var zone=above?'above':'below';
var col=above?'var(--green)':'var(--gold)';
var label=above
?'\u25B2 '+thresh.thresholdPct+'% (hits '+thresh.hitRateAbove+'%)'
:'\u25BC '+thresh.thresholdPct+'% (hits '+(thresh.hitRateBelow||0)+'%)';
return {
zone:zone, label:label, col:col, above:above,
thresholdPct:thresh.thresholdPct,
hitRateAbove:thresh.hitRateAbove,
hitRateBelow:thresh.hitRateBelow,
lift:thresh.lift,
reliability:thresh.reliability,
confidence:thresh.reliability
};
}

function classifyCodeStates(entries){
if(entries.length < 4) return {};
var sorted = entries.slice().sort(function(a,b){return a.date.localeCompare(b.date);});
var n = sorted.length;
var momentum = buildMomentumScore(entries);
var allCodes = Array.from(new Set(entries.reduce(function(a,e){return a.concat(e.codes);},[])));
var states = {};
allCodes.forEach(function(c){
var totalApps  = sorted.filter(function(e){return e.codes.indexOf(c)>-1;}).length;
var recentW    = Math.min(MOMENTUM_WINDOW, Math.floor(n/2));
var recentApps = sorted.slice(n-recentW).filter(function(e){return e.codes.indexOf(c)>-1;}).length;
var recentRate = recentApps / recentW;
var raw = momentum.raw ? (momentum.raw[c]||0) : 0;
var state;
if(recentApps === 0 && totalApps > 0) {
state = 'dormant';
} else if(raw >= 0.30) {
state = 'emerging';
} else if(raw <= -0.30) {
state = 'fading';
} else {
state = 'active';
}
states[c] = {state:state, raw:raw, recentRate:recentRate, totalApps:totalApps};
});
return states;
}

function buildCodeConfidenceGrade(code, snap, weights, entries, preds, letter, scorePct){
var breakdown=[];
var consensus=buildSignalConsensus(code, snap, weights, weights);
var consVal=consensus.score/100;
var thresh=buildScoreThreshold(code,entries,preds);
var threshVal=0;
if(thresh&&thresh.reliability!=='insufficient'){
threshVal=scorePct>=(thresh.thresholdPct||50)
?(thresh.hitRateAbove||50)/100
:(thresh.hitRateBelowThreshold||20)/100;
} else {
var appRate=buildAppearanceRate(entries);
threshVal=(appRate[code]||0)*0.67;
}
var bias=buildBias(preds);
var biasVal=bias[code]!==undefined?bias[code]:0.5;
var obs=letter?(shopObs(letter)[code]||{state:'idle'}):{state:'idle'};
var obsPenalty={idle:0,watching:30,recovering:20,confirmed:60,ambiguous:0}[obs.state]||0;
var obsVal=Math.max(0,100-obsPenalty)/100;
var momVal=Math.min(1,Math.max(0,snap.momentum||0.5));
var w={consensus:0.25, threshold:0.30, bias:0.25, obs:0.15, momentum:0.05};
var resolvedAll=preds.filter(function(p){return p.status!=='pending'&&p.outcome&&p.signalSnapshot;});
if(resolvedAll.length>=5){
var lifts={consensus:0,threshold:0,obs:0};
var liftCounts={consensus:0,threshold:0,obs:0};
resolvedAll.forEach(function(p){
if(p.predictedCodes.indexOf(code)===-1) return;
var isHit=p.outcome&&p.outcome[code]==='hit'?1:0;
var pSnap=p.signalSnapshot&&p.signalSnapshot[code]||{};
var pWts=p.weightsAtTime||weights;
var pCons=buildSignalConsensus(code,pSnap,pWts,pWts).score/100;
lifts.consensus+=(isHit-0.5)*(pCons-0.5)*4;
liftCounts.consensus++;
var pScorePct=p.scores&&p.scores[code]?p.scores[code]:50;
var pThresh=buildScoreThreshold(code,
entries.filter(function(e){return e.date<=p.createdDate;}),
preds.filter(function(q){return q.createdDate<p.createdDate;}));
if(pThresh&&pThresh.reliability!=='insufficient'){
var aboveT=pScorePct>=(pThresh.thresholdPct||50)?1:0;
lifts.threshold+=(isHit-0.5)*(aboveT-0.5)*4;
liftCounts.threshold++;
}
var pObs=p.signalSnapshot&&p.signalSnapshot[code]&&p.signalSnapshot[code].obsState||'idle';
var obsClean={idle:1,watching:0.4,recovering:0.5,confirmed:0,ambiguous:0.5}[pObs]||0.5;
lifts.obs+=(isHit-0.5)*(obsClean-0.5)*4;
liftCounts.obs++;
});
var normLifts={};
Object.keys(lifts).forEach(function(k){
normLifts[k]=liftCounts[k]>0?Math.max(-1,Math.min(1,lifts[k]/liftCounts[k])):0;
});
var lw={
consensus: Math.max(0.05, w.consensus  + normLifts.consensus  * 0.15),
threshold: Math.max(0.05, w.threshold  + normLifts.threshold  * 0.20),
bias:      w.bias,
obs:       Math.max(0.02, w.obs        + normLifts.obs        * 0.10),
momentum:  w.momentum
};
var blended={};
Object.keys(w).forEach(function(k){blended[k]=0.60*w[k]+0.40*(lw[k]||w[k]);});
var bSum=Object.values(blended).reduce(function(a,b){return a+b;},0);
Object.keys(blended).forEach(function(k){w[k]=blended[k]/bSum;});
}
var pts=Math.round((
consVal   * w.consensus  +
threshVal * w.threshold  +
biasVal   * w.bias       +
obsVal    * w.obs        +
momVal    * w.momentum
) * 100);
pts=Math.max(0,Math.min(100,pts));
var grade=pts>=80?'A':pts>=65?'B':pts>=50?'C':pts>=35?'D':'N';
var col  =pts>=80?'var(--green)':pts>=65?'var(--accent)':pts>=50?'var(--gold)':'var(--red)';
var topYes=consensus.yesSignals.slice(0,2).map(function(k){return SIGNAL_NAMES[k]||k;}).join(', ');
var topNo=consensus.noSignals.slice(0,1).map(function(k){return SIGNAL_NAMES[k]||k;}).join(', ');
var consDetail=topYes+(topNo?' &#xB7; &#x2193;'+topNo:'');
breakdown.push({label:'Signals', pts:Math.round(consVal*w.consensus*100), max:Math.round(w.consensus*100), detail:consDetail||'no strong signals'});
breakdown.push({label:'Threshold',  pts:Math.round(threshVal*w.threshold*100), max:Math.round(w.threshold*100),
detail:thresh&&thresh.reliability!=='insufficient'
?(scorePct>=(thresh.thresholdPct||50)?'\u25B2 above ('+thresh.hitRateAbove+'% hit)':'\u25BC below ('+(thresh.hitRateBelowThreshold||0)+'% hit)')
:'Threshold pending'});
breakdown.push({label:'Bias',       pts:Math.round(biasVal*w.bias*100),        max:Math.round(w.bias*100),
detail:resolvedAll.filter(function(p){return p.predictedCodes.indexOf(code)>-1;}).length
?Math.round(biasVal*100)+'% hit rate':' No history'});
breakdown.push({label:'Obs window', pts:Math.round(obsVal*w.obs*100),          max:Math.round(w.obs*100),
detail:obs.state==='idle'?'Clear':obs.state.toUpperCase()});
breakdown.push({label:'Momentum',   pts:Math.round(momVal*w.momentum*100),     max:Math.round(w.momentum*100),
detail:momVal>=0.65?'&#x2191; Emerging':momVal<=0.35?'&#x2193; Fading':'Stable'});
var score=pts;
return {score:score,grade:grade,col:col,pts:score,maxPts:100,breakdown:breakdown,
consensus:consensus,obsState:obs.state,weights:w,adapted:resolvedAll.length>=5};
}

function buildRefillConfidenceScore(entries, preds, top5Codes, bcsResult, letter){
if(!top5Codes.length) return {score:0,grade:'\u2014',col:'var(--muted)',breakdown:[]};
var scores  = bcsResult.scores||{};
var snaps   = bcsResult.snapshots||{};
var weights = bcsResult.weights||{};
var regime  = bcsResult.regime||{shifting:false};
var obs     = shopObs(letter)||{};
var resolved= preds.filter(function(p){return p.status!=='pending'&&p.outcome;});
var consensusSum=0;
top5Codes.forEach(function(c){
var cs=buildSignalConsensus(c,snaps[c]||{},weights,weights);
consensusSum+=cs.score/100;
});
var consVal=top5Codes.length?consensusSum/top5Codes.length:0.5;
var obsPenSum=0;
top5Codes.forEach(function(c){
var st=(obs[c]||{state:'idle'}).state;
obsPenSum+={confirmed:40,watching:15,recovering:20,idle:0,ambiguous:0}[st]||0;
});
var obsVal=Math.max(0,1-(obsPenSum/top5Codes.length)/100);
var last5=resolved.slice(-5);
var recentVal=0;
if(last5.length>=3){
var h=0,t=0;
last5.forEach(function(p){Object.values(p.outcome).forEach(function(v){t++;if(v==='hit')h++;});});
recentVal=t>0?h/t:0;
} else {
recentVal=0.33;
}
var stabilityVal=regime.shifting?(regime.overlapScore||0.5):1.0;
var w={consensus:0.15, obs:0.20, recent:0.45, stability:0.20};
if(resolved.length>=5){
var cLift=0,sLift=0,cN=0,sN=0;
resolved.slice(-10).forEach(function(p){
var slotCov=p.totalSlots>0?(p.slotsCovered||0)/p.totalSlots:0;
var isGood=slotCov>=0.4?1:0;
var pCons=0;
(p.predictedCodes||[]).forEach(function(c){
var pSnap=p.signalSnapshot&&p.signalSnapshot[c]||{};
var pWts=p.weightsAtTime||weights;
pCons+=buildSignalConsensus(c,pSnap,pWts,pWts).score/100;
});
pCons=p.predictedCodes.length?pCons/p.predictedCodes.length:0.5;
cLift+=(isGood-0.5)*(pCons-0.5)*4; cN++;
var wasStable=p.regimeAtTime?!p.regimeAtTime.shifting:true;
sLift+=(isGood-0.5)*((wasStable?1:0)-0.5)*4; sN++;
});
var normCL=cN>0?Math.max(-1,Math.min(1,cLift/cN)):0;
var normSL=sN>0?Math.max(-1,Math.min(1,sLift/sN)):0;
var lw={
consensus: Math.max(0.05, w.consensus  + normCL * 0.10),
obs:       w.obs,
recent:    w.recent,
stability: Math.max(0.05, w.stability  + normSL * 0.10)
};
var blended={};
Object.keys(w).forEach(function(k){blended[k]=0.60*w[k]+0.40*(lw[k]||w[k]);});
var bSum=Object.values(blended).reduce(function(a,b){return a+b;},0);
Object.keys(blended).forEach(function(k){w[k]=blended[k]/bSum;});
if(w.recent<0.40){
var deficit=0.40-w.recent;
w.recent=0.40;
w.consensus=Math.max(0.05,w.consensus-deficit*0.5);
w.stability=Math.max(0.05,w.stability-deficit*0.5);
}
}
var pts= consVal    * w.consensus +
obsVal     * w.obs       +
recentVal  * w.recent    +
stabilityVal* w.stability;
var score=Math.round(Math.max(0,Math.min(1,pts))*100);
var grade=score>=75?'A':score>=60?'B':score>=45?'C':score>=30?'D':'N';
var col=score>=75?'var(--green)':score>=60?'var(--accent)':score>=45?'var(--gold)':'var(--red)';
var breakdown=[
{label:'Signal consensus', pts:Math.round(consVal*w.consensus*100),    max:Math.round(w.consensus*100),  detail:Math.round(consVal*100)+'% avg across top-5'},
{label:'Obs window health',pts:Math.round(obsVal*w.obs*100),           max:Math.round(w.obs*100),        detail:Math.round(obsVal*100)+'% health'},
{label:'Recent accuracy',  pts:Math.round(recentVal*w.recent*100),     max:Math.round(w.recent*100),
detail:last5.length>=3?Math.round(recentVal*100)+'% code hit rate (last '+last5.length+')':'Insufficient history ('+last5.length+' preds)'},
{label:'Pattern stability',pts:Math.round(stabilityVal*w.stability*100),max:Math.round(w.stability*100),
detail:regime.shifting?'Shift detected ('+Math.round((regime.overlapScore||0)*100)+'% overlap)':'Stable'},
];
return {score:score,grade:grade,col:col,breakdown:breakdown,
regimeShifting:regime.shifting,weights:w,adapted:resolved.length>=5};
}

function buildCodeHitProfile(code, entries, predictions, letter){
var resolved = predictions.filter(function(p){
return p.status!=='pending' && p.outcome && p.predictedCodes.indexOf(code)>-1;
});
if(resolved.length < 2) return null;
var hits   = resolved.filter(function(p){return p.outcome[code]==='hit';});
var misses = resolved.filter(function(p){return p.outcome[code]==='miss';});
var partials=resolved.filter(function(p){return p.outcome[code]==='partial';});
var hitRate = Math.round(hits.length / resolved.length * 100);
var sigMeans = {};
SIGNAL_KEYS.forEach(function(k){
var hitVals  = hits.map(function(p){return p.signalSnapshot&&p.signalSnapshot[code]?p.signalSnapshot[code][k]||0:0;});
var missVals = misses.map(function(p){return p.signalSnapshot&&p.signalSnapshot[code]?p.signalSnapshot[code][k]||0:0;});
var hitMean  = hitVals.length  ? hitVals.reduce(function(a,b){return a+b;},0)/hitVals.length   : null;
var missMean = missVals.length ? missVals.reduce(function(a,b){return a+b;},0)/missVals.length : null;
var lift = (hitMean!==null && missMean!==null) ? hitMean - missMean : null;
sigMeans[k] = {hitMean:hitMean, missMean:missMean, lift:lift};
});
var liftWeights = {};
var totalLift = 0;
SIGNAL_KEYS.forEach(function(k){
var lift = sigMeans[k].lift;
if(lift !== null && lift > 0){ liftWeights[k] = lift; totalLift += lift; }
else liftWeights[k] = 0;
});
function computeHitScore(pred){
if(!pred.signalSnapshot||!pred.signalSnapshot[code]) return 0;
var snap = pred.signalSnapshot[code];
var score = 0;
SIGNAL_KEYS.forEach(function(k){
if(totalLift > 0) score += (snap[k]||0) * (liftWeights[k]/totalLift);
});
return score;
}
var hitScores  = hits.map(computeHitScore);
var missScores = misses.map(computeHitScore);
var allScores = resolved.map(function(p){
return {score:computeHitScore(p), isHit:p.outcome[code]==='hit'};
}).sort(function(a,b){return a.score-b.score;});
var threshold = 0;
if(allScores.length >= 3){
for(var i=Math.floor(allScores.length/2); i<allScores.length; i++){
var above = allScores.slice(i);
var aboveHits = above.filter(function(x){return x.isHit;}).length;
if(aboveHits/above.length >= 0.70){ threshold = allScores[i].score; break; }
}
}
var currentResult = buildCombinedScore(entries, predictions, letter);
var currentRaw = currentResult.scores[code]||0;
var maxScore   = Math.max.apply(null, Object.values(currentResult.scores).concat([0.001]));
var currentPct = Math.round(currentRaw/maxScore*100);
var thresholdPct = maxScore>0 ? Math.round(threshold/maxScore*100) : 50;
var confGap = currentPct - thresholdPct;
var confLevel = confGap >= 20 ? 'high'
: confGap >= 0  ? 'moderate'
: confGap >= -20? 'watch'
: 'low';
var avgQty = 0, maxQty = 0, qtyDist = {};
var qtyEntries = entries.filter(function(e){return e.codes.indexOf(code)>-1;});
qtyEntries.forEach(function(e){
var cnt = e.codes.filter(function(c){return c===code;}).length;
avgQty += cnt;
if(cnt > maxQty) maxQty = cnt;
qtyDist[cnt] = (qtyDist[cnt]||0)+1;
});
avgQty = qtyEntries.length > 0 ? (avgQty/qtyEntries.length) : 0;
var poolAvgQty = entries.reduce(function(a,e){return a+e.codes.length;},0) /
Array.from(new Set(entries.reduce(function(a,e){return a.concat(e.codes);},[] ))).length /
entries.length;
var gaps = [];
var lastIdx = -1;
entries.forEach(function(e,i){
if(e.codes.indexOf(code)>-1){
if(lastIdx>=0) gaps.push(i-lastIdx);
lastIdx = i;
}
});
var avgGap = gaps.length ? gaps.reduce(function(a,b){return a+b;},0)/gaps.length : null;
var recentW = Math.min(MOMENTUM_WINDOW, entries.length);
var recentApps = entries.slice(-recentW).filter(function(e){return e.codes.indexOf(code)>-1;}).length;
var coHits = {};
entries.filter(function(e){return e.codes.indexOf(code)>-1;}).forEach(function(e){
Array.from(new Set(e.codes)).forEach(function(c2){
if(c2!==code) coHits[c2] = (coHits[c2]||0)+1;
});
});
var topCoHits = Object.entries(coHits)
.sort(function(a,b){return b[1]-a[1];})
.slice(0,4)
.map(function(x){return {c:x[0], pct:Math.round(x[1]/qtyEntries.length*100)};});
return {
code:code, resolved:resolved.length, hitRate:hitRate,
hits:hits.length, misses:misses.length, partials:partials.length,
sigMeans:sigMeans,
confLevel:confLevel, confGap:confGap,
currentPct:currentPct, thresholdPct:thresholdPct,
avgQty:avgQty.toFixed(2), maxQty:maxQty, qtyDist:qtyDist, poolAvgQty:poolAvgQty.toFixed(2),
avgGap:avgGap?avgGap.toFixed(1):null, recentApps:recentApps, recentWindow:recentW,
topCoHits:topCoHits,
appRate: Math.round(qtyEntries.length/entries.length*100)
};
}

function buildTriggeredPerformance(letter){
var preds=shopPreds(letter);
var resolved=preds.filter(function(p){
return p.status!=='pending'&&p.triggeredOutcome&&Object.keys(p.triggeredOutcome).length;
});
var perCode={};
var perType={promoted:{hit:0,total:0},watchout:{hit:0,total:0}};
var byScoreBand={};
resolved.forEach(function(p){
Object.keys(p.triggeredOutcome).forEach(function(c){
var t=p.triggeredOutcome[c];
if(!perCode[c]) perCode[c]={code:c,promoted:{hit:0,total:0},watchout:{hit:0,total:0},scorePcts:[],dates:[]};
perCode[c][t.type].total++;
if(t.appeared) perCode[c][t.type].hit++;
if(t.scorePct!==null) perCode[c].scorePcts.push({pct:t.scorePct,appeared:t.appeared});
perCode[c].dates.push({date:p.actualDate||p.createdDate,appeared:t.appeared,type:t.type,scorePct:t.scorePct});
perType[t.type].total++;
if(t.appeared) perType[t.type].hit++;
if(t.scorePct!==null){
var band=Math.floor(t.scorePct/20)*20;
if(!byScoreBand[band]) byScoreBand[band]={hit:0,total:0};
byScoreBand[band].total++;
if(t.appeared) byScoreBand[band].hit++;
}
});
});
Object.keys(perCode).forEach(function(c){
var pc=perCode[c];
var totalAll=pc.promoted.total+pc.watchout.total;
var hitAll=pc.promoted.hit+pc.watchout.hit;
pc.hitRate=totalAll>0?Math.round(hitAll/totalAll*100):null;
pc.total=totalAll;
pc.hit=hitAll;
pc.promotedRate=pc.promoted.total>0?Math.round(pc.promoted.hit/pc.promoted.total*100):null;
pc.watchoutRate=pc.watchout.total>0?Math.round(pc.watchout.hit/pc.watchout.total*100):null;
var appPcts=pc.scorePcts.filter(function(x){return x.appeared;}).map(function(x){return x.pct;});
var missPcts=pc.scorePcts.filter(function(x){return !x.appeared;}).map(function(x){return x.pct;});
pc.avgScoreOnHit=appPcts.length?Math.round(appPcts.reduce(function(a,b){return a+b;},0)/appPcts.length):null;
pc.avgScoreOnMiss=missPcts.length?Math.round(missPcts.reduce(function(a,b){return a+b;},0)/missPcts.length):null;
});
var sorted=Object.values(perCode).sort(function(a,b){
if(b.hitRate!==a.hitRate) return (b.hitRate||0)-(a.hitRate||0);
return b.total-a.total;
});
return {
perCode:sorted,
perType:perType,
byScoreBand:byScoreBand,
resolvedCount:resolved.length
};
}

function buildMissAttribution(code, entries, preds, resolvedPred){
if(!resolvedPred||!resolvedPred.outcome||resolvedPred.outcome[code]!=='miss') return null;
var sorted   = entries.slice().sort(function(a,b){return a.date.localeCompare(b.date);});
var snap     = resolvedPred.signalSnapshot&&resolvedPred.signalSnapshot[code]||{};
var weights  = resolvedPred.weightsAtTime||{};
var scores   = resolvedPred.scores||{};
var maxS     = Math.max.apply(null,Object.values(scores).concat([0.001]));
var scorePct = Math.round((scores[code]||0)/maxS*100);
var topSig = SIGNAL_KEYS.map(function(k){
return {k:k,contrib:(snap[k]||0)*(weights[k]||DEFAULT_WEIGHTS[k])};
}).sort(function(a,b){return b.contrib-a.contrib;})[0];
var obs = shopObs(activeShop||'')[code]||{state:'idle'};
var cycleVal = snap.cycle||0;
var momentumVal = snap.momentum||0.5;
var resolved = preds.filter(function(p){return p.status!=='pending'&&p.outcome&&p.predictedCodes.indexOf(code)>-1;});
var consecMisses = 0;
for(var i=resolved.length-2;i>=0;i--){
if(resolved[i].outcome[code]==='miss') consecMisses++;
else break;
}
var threshold = buildScoreThreshold(code, entries, preds);
var belowThreshold = threshold && scorePct < threshold.thresholdPct;
var regime = sorted.length>=8 ? detectRegimeShift(sorted) : {shifting:false};
var fadingInRegime = regime.shifting && (regime.fading||[]).indexOf(code)>-1;
var cause, explanation, action;
if(cycleVal >= 0.35 && consecMisses % 2 === 0){
cause = 'cycle';
explanation = 'Cycle signal was '+Math.round(cycleVal*100)+'% at prediction time. Code appears on a ~2-refill cycle and this was likely the off-refill. Misses on known cycles are expected \u2014 not a model error.';
action = 'No penalty applied. Model will boost this code next refill (cycle trigger).';
} else if(fadingInRegime){
cause = 'regime_shift';
explanation = 'Regime shift detected \u2014 this code is in the declining set. Historical signals (especially '+( topSig?getSignalName(topSig.k):'frequency')+') reflect older patterns that no longer apply.';
action = 'Momentum signal will progressively reduce this code\'s score. Frequency weight dynamically reduced during regime.';
} else if(belowThreshold && threshold){
cause = 'below_threshold';
explanation = 'Score was '+scorePct+'% \u2014 below this code\'s empirical hit threshold of '+threshold.thresholdPct+'%. At this score level, the model has historically hit only '+threshold.hitRateBelowThreshold+'% of the time. This miss was statistically expected.';
action = 'No weight change. Score below threshold means the model already had low confidence for this code.';
} else if(consecMisses >= 1 && topSig && topSig.contrib > 0.1){
cause = 'counter_predictive_signal';
explanation = 'Consecutive miss #'+(consecMisses+1)+'. Dominant signal '+getSignalName(topSig.k)+' ('+Math.round(topSig.contrib*100)+'% contribution) has been high but code keeps missing. Signal may be counter-predictive for this code.';
action = obs.state==='confirmed'
? 'Observation window CONFIRMED \u2014 hard penalty (40%) already applied.'
: obs.state==='watching'
? 'Observation window WATCHING \u2014 z=accumulating. '+( OBS_MIN_N-consecMisses-1)+' more consistent misses needed to confirm.'
: 'Observation window opened \u2014 monitoring.';
} else if(momentumVal < 0.35){
cause = 'momentum_fade';
explanation = 'Momentum signal was '+Math.round(momentumVal*100)+'% (below 0.5 = fading). Code has been appearing less frequently in recent refills \u2014 historical signals overstated its likelihood.';
action = 'Momentum weight adjustment will reduce this code\'s score in subsequent predictions.';
} else {
cause = 'unexplained';
explanation = 'No clear structural cause. Score was '+scorePct+'%, dominant signal '+( topSig?getSignalName(topSig.k):'\u2014')+'. This may be genuine random variation \u2014 the code pool allows for unexpected absences.';
action = 'Single miss logged. Observation window monitoring. No weight change yet.';
}
return {
code:code, cause:cause, explanation:explanation, action:action,
scorePct:scorePct, topSig:topSig, consecMisses:consecMisses+1,
obsState:obs.state, cycleVal:cycleVal, belowThreshold:belowThreshold,
threshold:threshold
};
}

// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
// SHOP PERFORMANCE ANALYSIS
// Answers the four learner questions after every refill.
// Stored in db.shops[letter].performanceAnalysis \u2014 read by
// runBackgroundLearner and renderSignalPerf.
// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
function analyseShopPerformance(letter, preds){
var resolved=preds.filter(function(p){
  return p.status!=='pending'&&p.outcome&&(p.frozenSnapshots||p.signalSnapshot);
});
if(resolved.length<3) return null;

var n=resolved.length;
var HALF_LIFE=5;

// \u2500\u2500 Q1: What works \u2014 signal hit rate HIGH vs LOW \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
// For each signal, split resolved predictions into HIGH (>0.6)
// and LOW (<0.4) signal value, measure hit rate in each bucket.
// Lift = hitRateHigh - hitRateLow \u2014 positive = predictive.
var sigStats={};
SIGNAL_KEYS.forEach(function(k){
  sigStats[k]={highHits:0,highTotal:0,lowHits:0,lowTotal:0,neutralHits:0,neutralTotal:0};
});

resolved.forEach(function(p,idx){
  var rw=Math.pow(0.5,(n-1-idx)/HALF_LIFE);
  var rawSnap=getSnapshotForPred(p);
  var isC=!!(p.frozenSnapshots&&p.modelVersion);
  var snapD=decompressSnap(rawSnap,isC);
  function sv(c,k){
    var snap=snapD[c]; if(!snap) return null;
    return snap[k]!=null?snap[k]:null;
  }
  p.predictedCodes.forEach(function(c){
    var isHit=p.outcome[c]==='hit'?1:0;
    SIGNAL_KEYS.forEach(function(k){
      if(k==='bias') return;
      var v=sv(c,k); if(v===null) return;
      var st=sigStats[k];
      if(v>=0.6){st.highHits+=isHit*rw;st.highTotal+=rw;}
      else if(v<=0.35){st.lowHits+=isHit*rw;st.lowTotal+=rw;}
      else{st.neutralHits+=isHit*rw;st.neutralTotal+=rw;}
    });
  });
  // Surprise codes \u2014 signal was there but model missed them
  var surprises=p.surpriseCodes||(p.actualCodes||[]).filter(function(c){return p.predictedCodes.indexOf(c)===-1;});
  surprises.forEach(function(c){
    SIGNAL_KEYS.forEach(function(k){
      if(k==='bias') return;
      var v=sv(c,k); if(v===null) return;
      // Surprise arrived = hit=1 but model didn't predict it
      var st=sigStats[k];
      if(v>=0.6){st.highHits+=1*rw*0.7;st.highTotal+=rw*0.7;}
      else if(v<=0.35){st.lowHits+=1*rw*0.7;st.lowTotal+=rw*0.7;}
    });
  });
});

// Compute lift per signal
var sigEffectiveness={};
SIGNAL_KEYS.forEach(function(k){
  var st=sigStats[k];
  var hrHigh=st.highTotal>0?st.highHits/st.highTotal:null;
  var hrLow=st.lowTotal>0?st.lowHits/st.lowTotal:null;
  var lift=hrHigh!==null&&hrLow!==null?hrHigh-hrLow:null;
  var label=lift===null?'no data':lift>0.15?'predictive':lift>0.05?'weak':lift<-0.10?'counter':'neutral';
  sigEffectiveness[k]={
    hrHigh:hrHigh,hrLow:hrLow,lift:lift,
    label:label,
    highN:Math.round(st.highTotal),lowN:Math.round(st.lowTotal)
  };
});

// \u2500\u2500 Q2: What should have predicted differently \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
// Find codes that repeatedly arrived as surprises.
// For those codes, which signals were consistently HIGH?
// Those signals were pointing at the right answer.
var surpriseFreq={};
var surpriseSigStrength={};
resolved.forEach(function(p){
  var surprises=p.surpriseCodes||(p.actualCodes||[]).filter(function(c){return p.predictedCodes.indexOf(c)===-1;});
  var isC=!!(p.frozenSnapshots&&p.modelVersion);
  var rawSnap=getSnapshotForPred(p);
  var snapD=decompressSnap(rawSnap,isC);
  surprises.forEach(function(c){
    surpriseFreq[c]=(surpriseFreq[c]||0)+1;
    if(!surpriseSigStrength[c]) surpriseSigStrength[c]={};
    var sSnap=snapD[c]||(p.surpriseSnapshot&&p.surpriseSnapshot[c]);
    if(!sSnap) return;
    SIGNAL_KEYS.forEach(function(k){
      var fv=sSnap[k]!=null?sSnap[k]:0;
      surpriseSigStrength[c][k]=(surpriseSigStrength[c][k]||0)+fv;
    });
  });
});
// Codes that were missed 2+ times \u2014 these are the missed opportunities
var missedOpportunities=Object.keys(surpriseFreq)
  .filter(function(c){return surpriseFreq[c]>=2;})
  .map(function(c){
    var strengths=surpriseSigStrength[c]||{};
    var count=surpriseFreq[c];
    // Normalise by count, find top signals
    var topSignals=Object.keys(strengths)
      .map(function(k){return {k:k,avg:strengths[k]/count};})
      .filter(function(s){return s.avg>=0.5;})
      .sort(function(a,b){return b.avg-a.avg;})
      .slice(0,3);
    return {code:c,missCount:count,topSignals:topSignals};
  })
  .sort(function(a,b){return b.missCount-a.missCount;})
  .slice(0,5);

// \u2500\u2500 Q3: Build optimal weights from \u2460+\u2461 \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
// Start from current/anchor weights.
// Boost signals that are predictive (from \u2460).
// Boost signals that were high for missed codes (from \u2461).
// Reduce signals that are counter-predictive.
var optimalWeights=buildOptimalWeights(letter, sigEffectiveness, missedOpportunities, preds);

// \u2500\u2500 Q4: Store performance summary \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
var totalH=0,totalP=0;
resolved.forEach(function(p){Object.values(p.outcome).forEach(function(v){totalP++;if(v==='hit')totalH++;});});
var last5=resolved.slice(-5),prior5=resolved.slice(-10,-5);

var l5Rate=bRate(last5),p5Rate=bRate(prior5);
var trending=l5Rate!==null&&p5Rate!==null?(l5Rate-p5Rate>0.05?'improving':l5Rate-p5Rate<-0.05?'declining':'stable'):'insufficient';

return {
  sigEffectiveness:sigEffectiveness,
  missedOpportunities:missedOpportunities,
  optimalWeights:optimalWeights,
  trending:trending,
  hitRate:totalP>0?totalH/totalP:0,
  last5Rate:l5Rate,prior5Rate:p5Rate,
  resolvedCount:n
};
}

function buildOptimalWeights(letter, sigEff, missed, preds){
var db2=loadDB();
var pinnedId=db2.shops[letter].pinnedPredId;
var anchorPred=pinnedId?preds.find(function(p){return String(p.id)===String(pinnedId);}):null;
var baseW=Object.assign({},anchorPred&&anchorPred.weightsAtTime?anchorPred.weightsAtTime:getWeights(letter));

var optW=Object.assign({},baseW);

// From Q1: adjust by signal effectiveness
SIGNAL_KEYS.forEach(function(k){
  if(k==='bias') return;
  var eff=sigEff[k];
  if(!eff||eff.lift===null) return;
  // Lift > 0.15 -> boost; lift < -0.10 -> reduce; otherwise gentle nudge
  var adj=eff.lift>0.15?0.04:eff.lift>0.05?0.02:eff.lift<-0.10?-0.05:eff.lift<-0.02?-0.02:0;
  // Aggressive suppression: consistently negative signal gets near-zero weight
  var floor=eff.lift<-0.15&&eff.n>=5?0.01:0.02;
  optW[k]=Math.max(floor,Math.min(0.45,(baseW[k]||DEFAULT_WEIGHTS[k])+adj));
});

// From Q2: boost signals that consistently pointed at missed codes
missed.forEach(function(m){
  m.topSignals.forEach(function(s){
    if(s.avg>=0.6){
      // This signal was high when the missed code arrived \u2014 it's underweighted
      optW[s.k]=Math.min(0.45,(optW[s.k]||DEFAULT_WEIGHTS[s.k])+0.015*m.missCount);
    }
  });
});

return normaliseWeights(optW);
}

function runBackgroundLearner(letter){
if(!letter) return;
db=loadDB();
var entries=shopEntries(letter);
var preds=shopPreds(letter);
var resolved=preds.filter(function(p){
  return p.status!=="pending"&&p.outcome&&(p.frozenSnapshots||p.signalSnapshot);
});
if(resolved.length<3) return;
// Full performance analysis answers Q1-Q4
var analysis=analyseShopPerformance(letter,preds);
if(!analysis) return;
db.shops[letter].performanceAnalysis=analysis;
// Candidate weights from analysis
var currentW=getWeights(letter);
var learnedW=analysis.optimalWeights||currentW;
// Score both models
var sorted=entries.slice().sort(function(a,b){return a.date.localeCompare(b.date);});
// Backtest both models across ALL resolved predictions — not a fixed window
// "If new model had run from the beginning, how many more hits over N refills?"
// Use model history for per-version backtesting if available
// Otherwise backtest from first resolved prediction
var modelHistory=db.shops[letter].modelHistory||[];
var lastApply=modelHistory.filter(function(v){return v.decision==='apply';}).slice(-1)[0];
var btFromDate=lastApply?lastApply.date:(resolved.length>0?resolved[0].createdDate:sorted[0].date);
var btLearned=backtestWeights(letter,learnedW,btFromDate);
var btCurrent=backtestWeights(letter,currentW,btFromDate);
var TEST_N=btLearned?btLearned.detail.length:resolved.length;
var currentHits=btCurrent?Math.round(btCurrent.hitRate*TEST_N/100):0;
var learnedHits=btLearned?Math.round(btLearned.hitRate*TEST_N/100):0;
var hitGain=learnedHits-currentHits;
// Accumulate snapshot
var snaps=db.shops[letter].learnerSnapshots||[];
snaps.push({ts:Date.now(),learnedW:learnedW,hitGain:hitGain,
  currentHits:currentHits,learnedHits:learnedHits,testN:TEST_N});
if(snaps.length>10) snaps=snaps.slice(-10);
db.shops[letter].learnerSnapshots=snaps;
// Q4: Classify \u2014 autopilot vs alert
var positiveSnaps=snaps.filter(function(s){return s.hitGain>0;});
var consistency=snaps.length>0?positiveSnaps.length/snaps.length:0;
var consistent=consistency>=0.6&&snaps.length>=2;
var meaningful=hitGain>=1&&TEST_N>0&&hitGain/TEST_N>=0.15;
// Magnitude of weight change
var maxDelta=Math.max.apply(null,SIGNAL_KEYS.map(function(k){
  return Math.abs((learnedW[k]||DEFAULT_WEIGHTS[k])-(currentW[k]||DEFAULT_WEIGHTS[k]));
}));
// Counter-predictive: model relies on signal (wt>0.08) but signal hurts (lift<-0.10)
var counterSignals=SIGNAL_KEYS.filter(function(k){
  var eff=analysis.sigEffectiveness[k];
  return eff&&eff.lift!==null&&eff.lift<-0.10&&(currentW[k]||DEFAULT_WEIGHTS[k])>0.08;
});
// Declining hit rate
var hitRateDecline=analysis.trending==="declining"&&
  analysis.last5Rate!==null&&analysis.hitRate>0&&
  analysis.last5Rate<analysis.hitRate-0.10;
// Alert if big shift OR counter-signal OR declining
// Primary decision: backtest result drives apply/hold
// btDiff > 0 = new model beats current over full history → lean toward apply
// btDiff <= 0 = new model doesn't improve → hold
var btPositive=btLearned&&btCurrent&&(btLearned.hitRate-btCurrent.hitRate)>0;
var btDiffVal=btLearned&&btCurrent?btLearned.hitRate-btCurrent.hitRate:null;

// Alert conditions — even if backtest is positive, flag for review if risky
var needsAlert=(!btPositive)||(maxDelta>0.05||counterSignals.length>0||hitRateDecline);
// shouldUpdate: backtest positive AND consistent signal
var shouldUpdate=btPositive&&hitGain>0&&consistent;
// Alert reason — now driven by backtest first
var alertReason=!btPositive
  ?'Backtest shows no improvement over '+TEST_N+' refills \u2014 holding current model'
  :counterSignals.length>0
    ?'Counter-predictive signal: '+(counterSignals.map(function(k){return SIGNAL_NAMES[k]||k;}).join(', '))
    :hitRateDecline?'Hit rate declining \u2014 review before applying'
    :'Backtest positive but significant weight shift ('+Math.round(maxDelta*100)+'%) \u2014 review suggested';
var lastAlert=db.shops[letter].learnerAlert;
var sameModel=lastAlert&&lastAlert.learnedW&&
  Math.max.apply(null,SIGNAL_KEYS.map(function(k){
    return Math.abs((learnedW[k]||0)-(lastAlert.learnedW[k]||0));
  }))<0.02;
if(!shouldUpdate||sameModel){
  // Still store a hold verdict so owner can see learner's assessment
  if(!sameModel){
    var curT5Early=Object.entries(buildCombinedScore(sorted,preds,letter).scores)
      .sort(function(a,b){return b[1]-a[1];}).slice(0,5).map(function(x){return x[0];});
    db.shops[letter].learnerAlert={
      ts:Date.now(),hitGain:hitGain,applied:false,needsAlert:true,
      alertReason:!btPositive
        ?'Backtest shows no improvement over '+TEST_N+' refills \u2014 holding current model'
        :'Not enough consistent signal yet \u2014 holding current model',
      consistencyPct:Math.round(consistency*100),snapshotCount:snaps.length,
      currentHits:currentHits,learnedHits:learnedHits,testN:TEST_N,
      btAnchorRate:btLearned?btLearned.hitRate:null,
      btCurrentRate:btCurrent?btCurrent.hitRate:null,
      btDiff:btDiffVal,btN:TEST_N,
      currentTop5:curT5Early,learnedTop5:curT5Early,
      learnedOnly:[],currentOnly:[],
      topBoost:[],topReduce:[],
      learnedW:learnedW,prevW:currentW,
      missedOpportunities:(analysis.missedOpportunities||[]).slice(0,3)
    };
  }
  updateCodeLifts(letter,preds,db);
  saveDB(db);
  if(activeTab==="predict") renderLearnerAlert(letter);
  return;
}
// Build payload
var currentResult=buildCombinedScore(sorted,preds,letter);
var curT5=Object.entries(currentResult.scores).sort(function(a,b){return b[1]-a[1];}).slice(0,5).map(function(x){return x[0];});
if(!needsAlert){
  snapshotCurrentWeights(letter);
  db.shops[letter].weights=learnedW;
}
var lResult=buildCombinedScore(sorted,preds,letter);
var lT5=Object.entries(lResult.scores).sort(function(a,b){return b[1]-a[1];}).slice(0,5).map(function(x){return x[0];});
if(needsAlert) db.shops[letter].weights=currentW;
var sigChanges=SIGNAL_KEYS.map(function(k){
  return {k:k,delta:learnedW[k]-(currentW[k]||DEFAULT_WEIGHTS[k])};
}).sort(function(a,b){return Math.abs(b.delta)-Math.abs(a.delta);});
// Use backtest already computed above (all resolved predictions)
var btDiff=btDiffVal;
db.shops[letter].learnerAlert={
  ts:Date.now(),hitGain:hitGain,applied:!needsAlert,needsAlert:needsAlert,
  alertReason:needsAlert?alertReason:null,
  avgGain:Math.round(snaps.reduce(function(s,x){return s+x.hitGain;},0)/snaps.length*10)/10,
  consistencyPct:Math.round(consistency*100),snapshotCount:snaps.length,
  maxDelta:Math.round(maxDelta*100),counterSignals:counterSignals,
  trending:analysis.trending,
  currentHits:currentHits,learnedHits:learnedHits,testN:TEST_N,
  btAnchorRate:btLearned?btLearned.hitRate:null,
  btCurrentRate:btCurrent?btCurrent.hitRate:null,
  btDiff:btDiff,btN:TEST_N,
  learnedTop5:lT5,currentTop5:curT5,
  learnedOnly:lT5.filter(function(c){return curT5.indexOf(c)===-1;}),
  currentOnly:curT5.filter(function(c){return lT5.indexOf(c)===-1;}),
  topBoost:sigChanges.filter(function(s){return s.delta>0.02;}).slice(0,2),
  topReduce:sigChanges.filter(function(s){return s.delta<-0.02;}).slice(0,2),
  learnedW:learnedW,prevW:currentW,
  missedOpportunities:(analysis.missedOpportunities||[]).slice(0,3)
};
updateCodeLifts(letter,preds,db);
saveDB(db);
if(activeTab==="predict") renderLearnerAlert(letter);
}
function updateCodeLifts(letter,preds,db){
var codeLifts=db.shops[letter].codeSignalLifts||{};
var allR=preds.filter(function(p){return p.status!=="pending"&&p.outcome;});
var nR=allR.length,idx2=0;
preds.filter(function(p){return p.status!=="pending"&&p.outcome&&!p.codeLiftsProcessed;}).forEach(function(p){
  var rw=Math.pow(0.5,(nR-1-idx2)/5); idx2++;
  var rawSn=getSnapshotForPred(p);
  var isC=!!(p.frozenSnapshots&&p.modelVersion);
  var snaps=decompressSnap(rawSn,isC);
  (p.predictedCodes||[]).concat(p.surpriseCodes||[]).forEach(function(c){
    var snap=snaps[c]; if(!snap) return;
    var isHit=(p.actualCodes||[]).indexOf(c)>-1?1:0;
    if(!codeLifts[c]) codeLifts[c]={counts:{},lifts:{}};
    SIGNAL_KEYS.forEach(function(k){
      if(k==="bias") return;
      var sv=snap[k]||0;
      if(sv>0){
        // Co-occurrence gets 2x learning rate — strongest signal for random refills
        var lr=(k==='cooccur')?8:4;
        codeLifts[c].lifts[k]=(codeLifts[c].lifts[k]||0)+(isHit-0.5)*(sv-0.5)*lr*rw;
        codeLifts[c].counts[k]=(codeLifts[c].counts[k]||0)+rw;
      }
    });
  });
  p.codeLiftsProcessed=true;
});
db.shops[letter].codeSignalLifts=codeLifts;
}







function optimizeWeights(){
if(!activeShop){showToast('Select a shop first');return;}
snapshotCurrentWeights(activeShop);
if(navigator.vibrate) navigator.vibrate([40,30,40]);
var statusEl=document.getElementById('optimize-status');
var resultEl=document.getElementById('optimize-result');
if(statusEl) statusEl.innerHTML='';
if(resultEl) resultEl.innerHTML='';
db=loadDB();
var entries=shopEntries(activeShop);
var preds=shopPreds(activeShop).filter(function(p){
  return p.status!=='pending'&&p.outcome&&p.predictedCodes&&
         (p.frozenSnapshots||p.signalSnapshot);
});
if(entries.length<6){
  if(resultEl) resultEl.innerHTML='<div class="alert alert-warn">Need 6+ entries.</div>';
  return;
}
// Use pinnedPred weights as anchor if set \u2014 learner adjusts from best-hit baseline
var pinnedId=db.shops[activeShop].pinnedPredId;
var anchorW=null;
if(pinnedId){
  var pinnedPred=preds.find(function(p){return String(p.id)===String(pinnedId);});
  if(pinnedPred&&pinnedPred.weightsAtTime) anchorW=pinnedPred.weightsAtTime;
}
var origW=anchorW||getWeights(activeShop);
var sigLift={},sigCount={};
SIGNAL_KEYS.forEach(function(k){sigLift[k]=0;sigCount[k]=0;});
var n=preds.length;
preds.forEach(function(p,idx){
  var age=n-1-idx;
  var recWeight=Math.pow(0.5,age/RECENCY_HALF_LIFE);
  // Prefer frozenSnapshots (all codes) over signalSnapshot (top-5 only)
  var allSnaps=p.frozenSnapshots||p.signalSnapshot||{};
  // Predicted codes \u2014 hit or miss
  p.predictedCodes.forEach(function(c){
    var isHit=p.outcome[c]==='hit'?1:0;
    var snap=allSnaps[c];
    if(!snap) return;
    SIGNAL_KEYS.forEach(function(k){
      if(LIFT_EXCLUDE.indexOf(k)>-1) return;
      var sv=snap[k]||0;
      if(sv>0){
        sigLift[k]+=(isHit-0.5)*(sv-0.5)*4*recWeight;
        sigCount[k]+=recWeight;
      }
    });
  });
  // Surprise codes \u2014 arrived but not predicted (signal was there, model missed them)
  var surprises=p.surpriseCodes||(p.actualCodes||[]).filter(function(c){
    return p.predictedCodes.indexOf(c)===-1;
  });
  surprises.forEach(function(c){
    var snap=allSnaps[c]||(p.surpriseSnapshot&&p.surpriseSnapshot[c]);
    if(!snap) return;
    SIGNAL_KEYS.forEach(function(k){
      if(LIFT_EXCLUDE.indexOf(k)>-1) return;
      var sv=snap[k]||0;
      if(sv>0){
        // Surprise: signal was high but code wasn't predicted &#x2192; boost that signal
        // Weighted 0.7\u00D7 since model didn't act on it (less certain than confirmed pred)
        sigLift[k]+=(0.5)*(sv-0.5)*4*recWeight*0.7;
        sigCount[k]+=recWeight*0.7;
      }
    });
  });
});
var newW=Object.assign({},origW);
var MIN_WEIGHT=0.02,MAX_WEIGHT=0.45,LIFT_SCALE=0.35;
SIGNAL_KEYS.forEach(function(k){
  if(sigCount[k]<0.5) return;
  var normLift=Math.max(-1,Math.min(1,sigLift[k]/sigCount[k]));
  var evidenceScale=Math.min(1,sigCount[k]/3);
  newW[k]=Math.max(MIN_WEIGHT,Math.min(MAX_WEIGHT,(origW[k]||DEFAULT_WEIGHTS[k])+normLift*LIFT_SCALE*evidenceScale));
});
newW=normaliseWeights(newW);

// Apply and show results immediately (no async needed \u2014 pure calculation)
db.shops[activeShop].weights=newW;
saveDB(db);
if(navigator.vibrate) navigator.vibrate([30,20,30,20,80]);
if(statusEl) statusEl.innerHTML='';

// \u2500\u2500 What changed \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
var N_RECENT=Math.min(5, preds.length);
var recentHits=0, recentTotal=0;
preds.slice(-N_RECENT).forEach(function(p){
  Object.values(p.outcome).forEach(function(v){recentTotal++;if(v==='hit')recentHits++;});
});
var recentRate=recentTotal>0?Math.round(recentHits/recentTotal*100):0;

var changes=SIGNAL_KEYS.map(function(k){
  var before=origW[k]||DEFAULT_WEIGHTS[k];
  var after=newW[k]||DEFAULT_WEIGHTS[k];
  var lift=sigCount[k]>0?sigLift[k]/sigCount[k]:0;
  return {k:k, before:Math.round(before*100), after:Math.round(after*100),
          delta:Math.round((after-before)*100), lift:lift, count:sigCount[k]};
}).sort(function(a,b){return Math.abs(b.delta)-Math.abs(a.delta);});

var changeHtml=changes.filter(function(c){return Math.abs(c.delta)>=1;}).map(function(c){
  var col=c.delta>0?'var(--green)':c.delta<0?'var(--red)':'var(--muted)';
  var liftIcon=c.lift>0.1?'&#x2191; predictive':c.lift<-0.1?'&#x2193; noise':'&#x2192; neutral';
  var liftCol=c.lift>0.1?'var(--green)':c.lift<-0.1?'var(--red)':'var(--muted)';
  return '<div style="display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid var(--border)">'
    +'<div style="width:7px;height:7px;border-radius:50%;background:'+(SIGNAL_COLORS[c.k]||'var(--muted)')+';flex-shrink:0"></div>'
    +'<span style="font-size:11px;color:var(--muted);min-width:82px">'+(SIGNAL_NAMES[c.k]||c.k)+'</span>'
    +'<span style="font-size:10px;color:'+liftCol+';min-width:80px">'+liftIcon+'</span>'
    +'<div style="flex:1;height:4px;background:var(--surface2);border-radius:2px;overflow:hidden">'
      +'<div style="width:'+c.after+'%;height:100%;background:'+(SIGNAL_COLORS[c.k]||'var(--accent)')+'"></div>'
    +'</div>'
    +'<span style="font-size:11px;font-family:var(--mono);color:'+col+';min-width:56px;text-align:right">'+(c.delta>0?'+':'')+c.delta+'%&#x2192;'+c.after+'%</span>'
    +'</div>';
}).join('');

// Unchanged signals
var unchanged=changes.filter(function(c){return Math.abs(c.delta)<1;});

if(resultEl) resultEl.innerHTML=
  '<div class="alert alert-success" style="margin-bottom:8px">'
  +'<strong>&#x2705; Weights updated from recent performance</strong><br>'
  +'Based on last '+N_RECENT+' predictions &#xB7; '
  +'Recent hit rate: <strong style="color:'+(recentRate>=50?'var(--green)':recentRate>=30?'var(--gold)':'var(--red)')+'">'+recentRate+'%</strong><br>'
  +'<span style="font-size:11px;color:var(--muted)">Signals that predicted hits recently &#x2192; boosted. Signals that predicted misses &#x2192; reduced. Recency-weighted: last '+RECENCY_HALF_LIFE+' predictions count most.</span>'
  +'</div>'
  +(changeHtml
    ?'<div style="font-size:10px;font-weight:700;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px">Signal weight changes ('+changes.filter(function(c){return Math.abs(c.delta)>=1;}).length+' signals moved)</div>'+changeHtml
    :'')
  +(unchanged.length?'<div style="font-size:10px;color:var(--muted);margin-top:6px">'+unchanged.length+' signals unchanged (insufficient recent evidence)</div>':'')
  +'<div style="font-size:11px;color:var(--muted);margin-top:8px">Tap <strong>Rebuild</strong> to apply to predictions.</div>';

}

function snapshotCurrentWeights(letter){
  letter=letter||activeShop;
  if(!letter) return;
  db=loadDB();
  var w=getWeights(letter);
  db.shops[letter].preManualWeights=Object.assign({},w);
  saveDB(db);
}

function recordModelDecision(letter, decision, learnedW, btResult){
  // Stamp every apply/hold decision with full context
  // decision: 'apply' | 'hold'
  // All predictions made after this point will carry this modelVerId
  if(!letter) return;
  db=loadDB();
  var history=db.shops[letter].modelHistory||[];
  var verId=Date.now();
  var preds=shopPreds(letter);
  var pendingId=null;
  var pending=preds.filter(function(p){return p.status==='pending';});
  if(pending.length) pendingId=pending[pending.length-1].id;
  history.push({
    id:verId,
    date:todayStr(),
    ts:Date.now(),
    decision:decision,
    weightsApplied:decision==='apply'?Object.assign({},learnedW):null,
    weightsBefore:Object.assign({},getWeights(letter)),
    btAnchorRate:btResult?btResult.btAnchorRate:null,
    btCurrentRate:btResult?btResult.btCurrentRate:null,
    btDiff:btResult?btResult.btDiff:null,
    btN:btResult?btResult.btN:null,
    predIdAtTime:pendingId
  });
  // Keep last 20 model decisions
  if(history.length>20) history=history.slice(-20);
  db.shops[letter].modelHistory=history;
  // Tag active pending prediction with this model version
  if(decision==='apply'&&pendingId){
    var pred=preds.find(function(p){return p.id===pendingId;});
    if(pred) pred.modelVerId=verId;
  }
  // Store current modelVerId on shop for tagging future predictions
  db.shops[letter].currentModelVerId=verId;
  saveDB(db);
  return verId;
}



function processObservationWindow(letter, resolvedPred){
db=loadDB();
if(!resolvedPred||!resolvedPred.outcome) return {decisions:[], gradDecisions:[]};
var obs   = shopObs(letter);
var grad  = shopGrad(letter);
var snap  = resolvedPred.signalSnapshot||{};
var wAtTime = resolvedPred.weightsAtTime||{};
var decisions = [];
var sigLabels = {freq:'Frequency',recency:'Recency',streak:'Streak',
bias:'Pred. accuracy',cooccur:'Co-occurrence',interval:'Interval',
dow:'Day-of-week',cycle:'Cycle',overdue:'Overdue',
qtydom:'Qty dominance',qtystreak:'Qty streak'};
resolvedPred.predictedCodes.forEach(function(code){
var outcome = resolvedPred.outcome[code];
var isMiss  = outcome==='miss';
var isHit   = outcome==='hit'||outcome==='partial';
if(!obs[code]) obs[code]={state:'idle',consecMisses:0,consecHits:0,penaltyApplied:1.0,history:[]};
var cobs = obs[code];
cobs.history.push(outcome);
if(cobs.history.length>5) cobs.history.shift();
var prevState = cobs.state;
if(isMiss){
cobs.consecMisses++;
cobs.consecHits=0;
if(cobs.state==='idle'&&cobs.consecMisses===1){
cobs.state='watching';
cobs.penaltyApplied=OBS_SOFT_PENALTY;
decisions.push({code:code,action:'watching',
message:'1st miss \u2014 watching. Soft penalty ('+Math.round((1-OBS_SOFT_PENALTY)*100)+'%) held in reserve until confirmed.',
severity:'info', prevState:prevState, newState:'watching'});
} else if(cobs.state==='watching'&&cobs.consecMisses>=OBS_MIN_N){
cobs.state='confirmed';
cobs.penaltyApplied=OBS_HARD_PENALTY;
cobs.confirmedAt=resolvedPred.actualDate;
var topSig=SIGNAL_KEYS.map(function(k){
return {k:k,c:(snap[code]&&snap[code][k]||0)*(wAtTime[k]||0)};
}).sort(function(a,b){return b.c-a.c;})[0];
cobs.confirmedSignal=topSig?topSig.k:null;
decisions.push({code:code,action:'confirmed',
message:cobs.consecMisses+' consecutive misses confirmed. Hard penalty applied ('+Math.round((1-OBS_HARD_PENALTY)*100)+'%). '
+(topSig?sigLabels[topSig.k]+' signal flagged as counter-predictive for this code.':''),
severity:'danger', prevState:prevState, newState:'confirmed',
signal:topSig?topSig.k:null});
} else if(cobs.state==='confirmed'){
cobs.penaltyApplied=OBS_HARD_PENALTY;
decisions.push({code:code,action:'confirmed_ongoing',
message:'Miss #'+cobs.consecMisses+' \u2014 still confirmed. Penalty maintained.',
severity:'danger', prevState:prevState, newState:'confirmed'});
} else if(cobs.state==='recovering'){
cobs.state='watching';
cobs.consecHits=0;
cobs.penaltyApplied=OBS_SOFT_PENALTY;
decisions.push({code:code,action:'relapsed',
message:'Missed again after partial recovery. Back to watching.',
severity:'warning', prevState:prevState, newState:'watching'});
}
} else {
cobs.consecHits++;
cobs.consecMisses=0;
if(cobs.state==='confirmed'&&cobs.consecHits===1){
cobs.state='recovering';
cobs.penaltyApplied=Math.max(OBS_SOFT_PENALTY, 1.0-(1.0-OBS_HARD_PENALTY)*0.5);
decisions.push({code:code,action:'recovering',
message:'Code returned after confirmed absence. Recovery phase started. '
+'Need '+( OBS_RECOVER_HITS-1)+' more hit'+(OBS_RECOVER_HITS>2?'s':'')+' to fully restore.',
severity:'warning', prevState:prevState, newState:'recovering'});
} else if(cobs.state==='recovering'&&cobs.consecHits>=OBS_RECOVER_HITS){
cobs.state='idle';
cobs.penaltyApplied=1.0;
cobs.confirmedSignal=null;
decisions.push({code:code,action:'recovered',
message:'Code '+code+' fully recovered. Penalty removed. Window reset.',
severity:'positive', prevState:prevState, newState:'idle'});
} else if(cobs.state==='watching'&&cobs.consecHits>=1){
cobs.state='idle';
cobs.consecMisses=0;
cobs.penaltyApplied=1.0;
decisions.push({code:code,action:'cleared',
message:'Code appeared \u2014 single miss cleared. Window reset.',
severity:'positive', prevState:prevState, newState:'idle'});
}
}
});
var gradDecisions = [];
var wCurrent = getWeights(letter);
var wBefore  = Object.assign({},wCurrent);
var changed  = false;
SIGNAL_KEYS.forEach(function(k){
if(!grad[k]) grad[k]=[];
var totalGrad=0;
resolvedPred.predictedCodes.forEach(function(code){
var sigVal=(snap[code]&&snap[code][k])||0;
var isHit=resolvedPred.outcome[code]==='hit'?1:0;
totalGrad += LEARNING_RATE*(isHit-0.5)*sigVal;
});
grad[k].push({val:totalGrad, date:resolvedPred.actualDate||resolvedPred.createdDate});
if(grad[k].length>GRAD_MIN_N) grad[k].shift();
if(grad[k].length>=GRAD_MIN_N){
var positives=grad[k].filter(function(g){return g.val>0.0005;}).length;
var negatives=grad[k].filter(function(g){return g.val<-0.0005;}).length;
if(positives>=GRAD_MIN_N||negatives>=GRAD_MIN_N){
var direction = positives>=GRAD_MIN_N?1:-1;
var avgGrad   = grad[k].reduce(function(a,g){return a+g.val;},0)/grad[k].length;
wCurrent[k]   = (wCurrent[k]||DEFAULT_WEIGHTS[k])+avgGrad;
changed       = true;
gradDecisions.push({signal:k,label:sigLabels[k],
direction:direction>0?'up':'down',
gradients:grad[k].map(function(g){return g.val>0?'+':'\u2212';}),
delta:Math.round(avgGrad*100*10)/10,
from:Math.round(wBefore[k]*100),
to:Math.round(wCurrent[k]*100),
reason:direction>0?'Consistently drove correct predictions':'Consistently drove missed predictions'
});
grad[k]=[];
} else {
gradDecisions.push({signal:k,label:sigLabels[k],
direction:'mixed', gradients:grad[k].map(function(g){return g.val>0?'+':'\u2212';}),
reason:'Mixed signal \u2014 gradients disagree. Not applied (noise protection).',
delta:0});
}
}
});
if(changed){
wCurrent=normaliseWeights(wCurrent);
saveWeights(letter,wCurrent);
}
db=loadDB();
shopData(letter).obsWindow=obs;
shopData(letter).gradAccum=grad;
saveDB(db);
return {decisions:decisions, gradDecisions:gradDecisions, weightsChanged:changed};
}



function scoreWeights(w,testPredictions){
  var totalHits=0;
  testPredictions.forEach(function(p){
    var top5;
    if(p.frozenSnapshots&&Object.keys(p.frozenSnapshots).length){
      var isC=!!(p.modelVersion); // compact format = 0-100 integers
      var scored={};
      Object.keys(p.frozenSnapshots).forEach(function(c){
        var snap=p.frozenSnapshots[c];
        scored[c]=SIGNAL_KEYS.reduce(function(sum,k){
          var sv=isC?(snap[k]||0)/100:(snap[k]||0);
          return sum+sv*(w[k]||DEFAULT_WEIGHTS[k]);
        },0);
      });
      top5=Object.entries(scored).sort(function(a,b){return b[1]-a[1];}).slice(0,5).map(function(x){return x[0];});
    } else {
      // Fallback: recompute from entry history (older predictions without frozenSnapshots)
      var trainEntries=sorted.filter(function(e){return e.date<p.createdDate;});
      if(trainEntries.length<3) return;
      var freq2=buildFreqMap(trainEntries),rec2=buildWeightedScore(trainEntries);
      var str2=buildStreaks(trainEntries),cooc2=buildCooccurrence(trainEntries);
      var cyc2=buildCycleScore(trainEntries),mom2=buildMomentumScore(trainEntries).scores||{};
      var ovd2=buildOverdueScore(trainEntries),int2=buildIntervalRegularity(trainEntries);
      var qd2=buildQtyDominance(trainEntries),qs2=buildQtyStreak(trainEntries);
      var allCodes=Array.from(new Set(trainEntries.reduce(function(a,e){return a.concat(e.codes);},[]) ));
      var sc={};
      allCodes.forEach(function(c){
        sc[c]=(freq2[c]||0)*w.freq+(rec2[c]||0)*w.recency+(str2[c]||0)*w.streak+
          (cooc2[c]||0)*w.cooccur+(cyc2[c]||0)*w.cycle+(mom2[c]||0)*w.momentum+
          (ovd2[c]||0)*w.overdue+(int2[c]||0)*w.interval+(qd2[c]||0)*w.qtydom+(qs2[c]||0)*w.qtystreak;
      });
      top5=Object.entries(sc).sort(function(a,b){return b[1]-a[1];}).slice(0,5).map(function(x){return x[0];});
    }
    top5.forEach(function(c){
      if(p.actualCodes&&p.actualCodes.indexOf(c)>-1) totalHits++;
    });
  });
  return totalHits;
}

function applySurpriseGradient(letter, surpriseCodes, entries){
if(!surpriseCodes.length||entries.length<5) return [];
db=loadDB();
var w=getWeights(letter);
var wBefore=Object.assign({},w);
var changes=[];
surpriseCodes.forEach(function(code){
var fv=buildFeatureVector_simple(code,entries);
var topSignal=SIGNAL_KEYS.map(function(k){
return {k:k,val:fv[k]||0};
}).sort(function(a,b){return b.val-a.val;})[0];
if(topSignal&&topSignal.val>0.3){
var boost=LEARNING_RATE*0.5*topSignal.val;
w[topSignal.k]=Math.min(WEIGHT_MAX,(w[topSignal.k]||DEFAULT_WEIGHTS[topSignal.k])+boost);
changes.push({code:code,signal:topSignal.k,val:topSignal.val,
from:Math.round(wBefore[topSignal.k]*100),
to:Math.round(w[topSignal.k]*100)});
}
});
if(changes.length){
w=normaliseWeights(w);
saveWeights(letter,w);
db=loadDB();
shopData(letter).gradAccum=shopData(letter).gradAccum||{};
saveDB(db);
}
return changes;
}

function cleanupStorage(d){
// Trim frozenSnapshots/frozenScores from old predictions to stay under localStorage quota
// frozenSnapshots: keep last 10 per shop (enough for recency-weighted learner)
// frozenScores: keep last 20 per shop (display fallback for history)
Object.keys(d.shops||{}).forEach(function(letter){
  var preds=(d.shops[letter].predictions||[]).filter(function(p){return p.status!=='pending';});
  // Sort newest first
  var sorted=preds.slice().sort(function(a,b){
    return (b.actualDate||b.createdDate||'').localeCompare(a.actualDate||a.createdDate||'');
  });
  sorted.forEach(function(p,idx){
    if(idx>=10) delete p.frozenSnapshots;  // keep last 10
    if(idx>=20) delete p.frozenScores;    // keep last 20
  });
});
return d;
}

function saveDB(d){
d=cleanupStorage(d);
// Three-tier save \u2014 each tier strips more to fit under quota
// Tier 1: normal save with cleanup
var tiers=[
  function(data){return JSON.stringify(data);},
  // Tier 2: strip all frozenSnapshots + frozenScores
  function(data){
    Object.keys(data.shops||{}).forEach(function(s){
      (data.shops[s].predictions||[]).forEach(function(p){
        delete p.frozenSnapshots; delete p.frozenScores;
      });
    });
    return JSON.stringify(data);
  },
  // Tier 3: strip ALL predictions (entries are king \u2014 never lose entries)
  function(data){
    Object.keys(data.shops||{}).forEach(function(s){
      data.shops[s].predictions=[];
      delete data.shops[s].obsWindow;
      delete data.shops[s].gradAccum;
      delete data.shops[s].codeSignalLifts;
      delete data.shops[s].learnerAlert;
      delete data.shops[s].preManualWeights;
    });
    return JSON.stringify(data);
  }
];
var saved=false;
for(var t=0;t<tiers.length;t++){
  try{
    var str=tiers[t](d);
    localStorage.setItem(DB_KEY,str);
    localStorage.setItem(DB_BAK,str);
    saved=true;
    if(t>0) showToast('Storage full \u2014 '+(t===1?'stripped model cache':'stripped predictions to save entries'),'warn');
    break;
  }catch(e){
    if(e.name!=='QuotaExceededError'&&e.code!==22) throw e;
    // continue to next tier
  }
}
if(!saved){
  showToast('&#x26A0;&#xFE0F; Storage completely full \u2014 entries may not have saved. Go to DATA and export a backup.','warn');
}
}

function autoResolve(letter, actualDate, actualCodes){
db=loadDB();
var preds=shopPreds(letter);
var entries=shopEntries(letter);
var hadPrediction=false;
var resolvedPreds=[];
preds.filter(function(p){return p.status==='pending'&&actualDate>p.createdDate;}).forEach(function(p){
var outcome={};
var avgQty=buildAvgQty(entries);
p.predictedCodes.forEach(function(c){
var cnt=actualCodes.filter(function(x){return x===c;}).length;
outcome[c]=cnt===0?'miss':cnt>=Math.round(avgQty[c]||1)?'hit':'partial';
});
p.slotsCovered=actualCodes.filter(function(c){return p.predictedCodes.indexOf(c)>-1;}).length;
p.totalSlots=actualCodes.length;
p.status=resolveStatus(outcome);
p.outcome=outcome;
p.actualDate=actualDate;
p.actualCodes=Array.from(new Set(actualCodes));
p.liveResolved=true;
// \u2500\u2500 GAP 2+3: Capture signal snapshot for SURPRISE codes \u2500\u2500
// Surprise = arrived but not in top-5 prediction
// These are the codes the model SHOULD have predicted.
// Storing their signal values at prediction time lets the learner
// compute: "signal X was HIGH for this code + it hit &#x2192; signal X weight up"
var surpriseCodes=actualCodes.filter(function(c){return p.predictedCodes.indexOf(c)===-1;});
if(surpriseCodes.length&&entries.length>=3){
var trainEntries=entries.filter(function(e){return e.date<=p.createdDate;});
if(trainEntries.length>=3){
var freq2=buildFreqMap(trainEntries);
var rec2=buildWeightedScore(trainEntries);
var str2=buildStreaks(trainEntries);
var cooc2=buildCooccurrence(trainEntries);
var cyc2=buildCycleScore(trainEntries);
var mom2=buildMomentumScore(trainEntries).scores||{};
var ovd2=buildOverdueScore(trainEntries);
var int2=buildIntervalRegularity(trainEntries);
var qd2=buildQtyDominance(trainEntries);
var qs2=buildQtyStreak(trainEntries);
var surpriseSnap={};
surpriseCodes.forEach(function(c){
surpriseSnap[c]={
freq:freq2[c]||0,
recency:rec2[c]||0,
streak:str2[c]||0,
cooccur:cooc2[c]||0,
cycle:cyc2[c]||0,
momentum:mom2[c]||0,
overdue:ovd2[c]||0,
interval:int2[c]||0,
qtydom:qd2[c]||0,
qtystreak:qs2[c]||0
};
});
p.surpriseSnapshot=surpriseSnap;
p.surpriseCodes=surpriseCodes;
// Save surprise snapshots to external store keyed by pred id
saveSnapshot(p.id+'-surp', surpriseSnap);
}}
// \u2500\u2500 SEQUENCE: freeze &#x2192; compare &#x2192; save new prediction &#x2192; THEN learn \u2500\u2500
// codeSignalLifts updated by runBackgroundLearner AFTER new prediction is saved
// Triggered outcomes
var allT=Array.from(new Set((p.promotedCodes||[]).concat(p.watchoutCodes||[]).filter(function(c){return p.predictedCodes.indexOf(c)===-1;})));
var fullSc=db.shops[letter].lastFullScores||{};
var tOut={};
allT.forEach(function(c){tOut[c]={appeared:actualCodes.indexOf(c)>-1,type:(p.promotedCodes&&p.promotedCodes.indexOf(c)>-1)?'promoted':'watchout',scorePct:fullSc[c]!=null?fullSc[c]:null};});
p.triggeredOutcome=tOut;
hadPrediction=true;
resolvedPreds.push(p);
});
if(hadPrediction){
saveDB(db);
setTimeout(function(){learnAndStoreThresholds(letter);},100);
}
return {hadPrediction:hadPrediction,resolved:resolvedPreds,worstStatus:resolvedPreds.length?resolvedPreds[0].status:null};
}

function autoSavePrediction(letter){
db=loadDB();
// Clear stale per-code lifts if signal version changed
Object.keys(db.shops||{}).forEach(function(s){
  if(db.shops[s].codeSignalLiftsVersion!==SIGNAL_VERSION){
    db.shops[s].codeSignalLifts={};
    db.shops[s].codeSignalLiftsVersion=SIGNAL_VERSION;
  }
});
var entries=shopEntries(letter);
if(entries.length<3) return;
var preds=shopPreds(letter);
var result=buildCombinedScore(entries,preds,letter);
var scores=result.scores;
var snapshots=result.snapshots;
var top5=Object.entries(scores).sort(function(a,b){return b[1]-a[1];}).slice(0,5);
if(!top5.length) return;
var lastEntryDate=entries[entries.length-1].date;
var top5Max=top5.length?top5[0][1]:0.001;
var fullMax=Math.max.apply(null,Object.values(scores).concat([0.001]));
// Normalised scores (0-100) for all codes \u2014 frozen at prediction time
// Rebuild NEVER recomputes these \u2014 this is the immutable model snapshot
var frozenScores={};
Object.keys(scores).forEach(function(c){
  frozenScores[c]=Math.round(scores[c]/fullMax*100);
});
// Compact frozenSnapshots: signal values as 0-100 integers, not floats
// This saves ~60% storage vs raw float keys
var compactSnaps={};
Object.keys(snapshots).forEach(function(c){
  var snap=snapshots[c];
  if(!snap) return;
  var compacted={};
  SIGNAL_KEYS.forEach(function(k){
    var v=snap[k];
    if(v!=null&&v>0) compacted[k]=Math.round(v*100); // 0.72 &#x2192; 72
  });
  if(Object.keys(compacted).length) compactSnaps[c]=compacted;
});
// CRITICAL: never replace resolved predictions \u2014 they are frozen records
// Only remove the pending prediction, keep all resolved ones intact
var existingPreds=db.shops[letter].predictions||[];
var resolvedPreds=existingPreds.filter(function(p){return p.status!=='pending';});
db.shops[letter].predictions=resolvedPreds;
db.shops[letter].lastFullScores=frozenScores;
// Top-5 display scores (normalised 0-100)
var top5Scores=top5.reduce(function(o,x){o[x[0]]=Math.round(x[1]/top5Max*100);return o;},{});
var predId=Date.now();
// Always save snapshot to external store \u2014 learner can analyze anytime
saveSnapshot(predId,compactSnaps);
// Also embed inline for the 10 most recent (fast path for learner)
var predsWithSnaps=resolvedPreds.filter(function(p){return p.frozenSnapshots;}).length;
var embedInline=predsWithSnaps<10;
db.shops[letter].predictions.push({
  id:predId,
  createdDate:lastEntryDate,
  targetDate:null,
  modelVersion:SIGNAL_VERSION,
  predictedCodes:top5.map(function(x){return x[0];}),
  promotedCodes:(result.promotions||[]).map(function(p){return p.promoted;}),
  patternRules:(result.promotions||[]).map(function(p){
    return p.pattern&&p.pattern.rule?p.pattern.rule.slice(0,40):'pattern';
  }),
  watchoutCodes:(result.watchouts||[]).map(function(w){return w.code;}),
  regimeAtTime:result.regime?{shifting:result.regime.shifting,note:result.regime.note||''}:null,
  scores:top5Scores,
  frozenScores:frozenScores,
  frozenSnapshots:embedInline?compactSnaps:null, // inline for recent, external store for all
  weightsAtTime:Object.assign({},result.weights),
  status:'pending',
  outcome:null,
  actualDate:null,
  actualCodes:null,
  auto:true
});
saveDB(db);
setTimeout(function(){ runBackgroundLearner(letter); }, 0);
}

// \u2500\u2500 SNAPSHOT STORE \u2014 separate from main DB \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
// frozenSnapshots stored outside main DB keyed by predId.
// This prevents cleanupStorage from ever stripping them.
// The learner can always access full signal history for analysis.
var SNAP_KEY='inv_intel_snaps';
function saveSnapshot(predId,compactSnaps){
  if(!predId||!compactSnaps||!Object.keys(compactSnaps).length) return;
  try{
    var store=JSON.parse(localStorage.getItem(SNAP_KEY)||'{}');
    store[String(predId)]=compactSnaps;
    var keys=Object.keys(store);
    if(keys.length>50){
      keys.sort(function(a,b){return Number(a)-Number(b);});
      keys.slice(0,keys.length-50).forEach(function(k){delete store[k];});
    }
    localStorage.setItem(SNAP_KEY,JSON.stringify(store));
  }catch(e){
    try{
      var store2=JSON.parse(localStorage.getItem(SNAP_KEY)||'{}');
      var keys2=Object.keys(store2).sort(function(a,b){return Number(a)-Number(b);});
      keys2.slice(0,Math.floor(keys2.length/2)).forEach(function(k){delete store2[k];});
      store2[String(predId)]=compactSnaps;
      localStorage.setItem(SNAP_KEY,JSON.stringify(store2));
    }catch(e2){}
  }
}
function loadSnapshot(predId){
  try{
    var store=JSON.parse(localStorage.getItem(SNAP_KEY)||'{}');
    return store[String(predId)]||null;
  }catch(e){return null;}
}
function getSnapshotForPred(pred){
  if(pred.frozenSnapshots&&Object.keys(pred.frozenSnapshots).length) return pred.frozenSnapshots;
  return loadSnapshot(pred.id)||null;
}
function decompressSnap(snap,isCompact){
  if(!snap) return {};
  if(!isCompact) return snap;
  var out={};
  Object.keys(snap).forEach(function(c){
    var s=snap[c]; if(!s) return;
    out[c]={};
    Object.keys(s).forEach(function(k){out[c][k]=(s[k]||0)/100;});
  });
  return out;
}

var top=top5Codes[0];
var topSnap=snaps[top]||{};
var topSig=SIGNAL_KEYS.map(function(k){
return {k:k,contrib:(topSnap[k]||0)*(weights[k]||DEFAULT_WEIGHTS[k])};
}).sort(function(a,b){return b.contrib-a.contrib;})[0];
var topRate=Math.round((appRate[top]||0)*100);
var topStreak=streaks[top]||0;
var topState=codeStates[top]?codeStates[top].state:'active';
var s1='Top pick is <strong>'+top+'</strong>';
if(topStreak>=3) s1+=' ('+topStreak+'-refill streak)';
if(topRate>=80) s1+=', appearing in '+topRate+'% of all refills';
if(topSig) s1+='. Leading signal: '+getSignalName(topSig.k);
if(topState==='emerging') s1+='. &#x2191; Momentum rising.';
parts.push(s1+'.');
var implications=buildCooccurImplications(entries,top5Codes);
var tightImps=implications.filter(function(x){return x.tight;});
if(tightImps.length){
var s2='Tight pair'+(tightImps.length>1?'s':'')+': ';
s2+=tightImps.slice(0,2).map(function(imp){
return '<strong>'+imp.impliedCode+'</strong> almost always arrives with <strong>'+imp.via+'</strong> ('+imp.rate+'%)';
}).join('; ')+'.';
parts.push(s2);
}
if(regime.shifting){
parts.push('&#x26A1; Pattern shift detected \u2014 '+( regime.emerging&&regime.emerging.length?regime.emerging.join(', ')+' emerging':'new codes rising')+'. Recent signals weighted more heavily.');
} else if(last5.length>=3){
var l5H=0,l5T=0;
last5.forEach(function(p){Object.values(p.outcome).forEach(function(v){l5T++;if(v==='hit')l5H++;});});
var l5Rate=l5T>0?Math.round(l5H/l5T*100):0;
var trend=l5Rate>=60?'performing well ('+l5Rate+'% code hit rate last 5)':l5Rate>=35?'moderate accuracy ('+l5Rate+'% last 5)':'below average ('+l5Rate+'% last 5) \u2014 model still calibrating';
parts.push('Recent model accuracy: '+trend+'.');
}
var confirmed=top5Codes.filter(function(c){return obs[c]&&obs[c].state==='confirmed';});
if(confirmed.length){
parts.push('&#x26A0;&#xFE0F; Note: <strong>'+confirmed.join(', ')+'</strong> '+( confirmed.length>1?'are':'is')+' under observation window penalty \u2014 '+( confirmed.length>1?'their':'its')+' scores are already reduced.');
}
return parts.join(' ');
}

function renderShopManageList(){

  el.innerHTML='<div style="margin-bottom:10px">'+shops.map(function(s){

function renderStorageHealth(){
  var el=document.getElementById('storage-health-bar');
  if(!el) return;
  try{
    var used=JSON.stringify(localStorage).length;
    var pct=Math.round(used/5242880*100);
    var col=pct>80?'var(--red)':pct>60?'var(--gold)':'var(--green)';
    el.innerHTML='<div style="margin-bottom:4px;display:flex;justify-content:space-between">'
      +'<span style="font-size:11px;color:var(--muted)">Storage</span>'
      +'<span style="font-size:11px;font-family:var(--mono);color:'+col+'">'+pct+'% &#xB7; '+Math.round(used/1024)+'KB / 5120KB</span>'
      +'</div>'
      +'<div class="progress-track"><div class="progress-fill" style="width:'+pct+'%;background:'+col+'"></div></div>';
  }catch(e){}
}
