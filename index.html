function handleImportFile(evt){
  var file=evt.target.files[0];
  if(!file) return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var imported=JSON.parse(e.target.result);
      var result=document.getElementById('backup-result');
      // Full backup
      if(imported.shops){
        db=loadDB();
        var added=0,merged=0;
        Object.keys(imported.shops).forEach(function(code){
          if(!db.shops[code]){
            db.shops[code]=imported.shops[code];
            added++;
          } else {
            // Merge entries \u2014 add any not already in DB
            var existing=new Set((db.shops[code].entries||[]).map(function(e){return e.date+'|'+e.codes.slice().sort().join(',');}));
            var newEntries=(imported.shops[code].entries||[]).filter(function(e){
              return !existing.has(e.date+'|'+e.codes.slice().sort().join(','));
            });
            db.shops[code].entries=(db.shops[code].entries||[]).concat(newEntries);
            db.shops[code].entries.sort(function(a,b){return a.date.localeCompare(b.date);});
            merged++;
          }
        });
        saveDB(db);
        renderShopPills();
        renderDataTab();
        if(result) result.innerHTML='<div class="alert alert-ok">&#x2705; Imported \u2014 '+added+' new shops, '+merged+' merged</div>';
        showToast('Backup restored','ok');
      } else {
        if(result) result.innerHTML='<div class="alert alert-warn">&#x26A0;&#xFE0F; Unrecognised backup format</div>';
      }
    }catch(err){
      var result=document.getElementById('backup-result');
      if(result) result.innerHTML='<div class="alert alert-err">Error reading file: '+err.message+'</div>';
    }
  };
  reader.readAsText(file);
  evt.target.value='';
}

function renderSignalPerf(weights,preds,snaps,scores){
  var el=document.getElementById('signal-perf-panel');
  if(!el) return;
  db=loadDB();
  var analysis=db.shops[activeShop]&&db.shops[activeShop].performanceAnalysis;
  var sigEff=analysis&&analysis.sigEffectiveness||{};
  var missed=analysis&&analysis.missedOpportunities||[];

  // Signal bars with effectiveness from analysis
  var html=SIGNAL_KEYS.map(function(k){
    var w=Math.round((weights[k]||DEFAULT_WEIGHTS[k])*100);
    var col=SIGNAL_COLORS[k]||'var(--accent)';
    var eff=sigEff[k];
    var liftStr='',liftCol='var(--muted)';
    if(eff&&eff.lift!==null){
      var lift=Math.round(eff.lift*100);
      if(eff.label==='predictive'){liftStr='&#x2191; +'+lift+'%';liftCol='var(--green)';}
      else if(eff.label==='counter'){liftStr='&#x2193; '+lift+'%';liftCol='var(--red)';}
      else if(eff.label==='weak'){liftStr='&#x2191; +'+lift+'%';liftCol='var(--muted)';}
      else{liftStr='&#x2192; neutral';liftCol='var(--muted)';}
    } else {
      liftStr='no data yet';
    }
    return '<div class="sig-bar-wrap">'
      +'<div class="sig-bar-row">'
        +'<span class="sig-bar-name">'+((SIGNAL_NAMES&&SIGNAL_NAMES[k])||k)+'</span>'
        +'<div class="sig-bar-track"><div class="sig-bar-fill" style="width:'+w+'%;background:'+col+'"></div></div>'
        +'<span class="sig-bar-val" style="color:'+col+'">'+w+'%</span>'
        +'<span class="sig-bar-lift" style="color:'+liftCol+'">'+liftStr+'</span>'
      +'</div>'
      +'</div>';
  }).join('');

  // Missed opportunities (Q2 \u2014 what should have been predicted)
  if(missed.length){
    html+='<div style="margin-top:10px;font-size:10px;font-weight:700;color:var(--muted);'
      +'text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Missed opportunities</div>';
    html+=missed.map(function(m){
      var topSigNames=m.topSignals.map(function(s){return SIGNAL_NAMES[s.k]||s.k;}).join(', ');
      return '<div style="display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid var(--border)">'
        +'<span class="mono" style="font-weight:900;color:var(--gold);min-width:28px">'+m.code+'</span>'
        +'<span style="font-size:11px;color:var(--muted);flex:1">missed '+m.missCount+'\u00D7 &#xB7; signals: '+topSigNames+'</span>'
      +'</div>';
    }).join('');
  }

  el.innerHTML=html;
}

    +'</div>'
    +(rcs.regimeShifting?'<span class="conf-badge conf-low" style="margin-left:auto">&#x26A1; regime shift</span>':'')

function renderPredictionCodes(result,entries,preds){
  var el=document.getElementById('prediction-codes');
  if(!el) return;

  var scores=result.scores;
  var snaps=result.snapshots;
  var weights=result.weights;
  var fullMax=Math.max.apply(null,Object.values(scores).concat([0.001]));

  var ranked=Object.entries(scores).sort(function(a,b){return b[1]-a[1];});
  var top5=ranked.slice(0,5);
  var top5Codes=top5.map(function(x){return x[0];});
  // Build promotions via applyEmergentToTop3
  var patterns=buildEmergentPatterns(entries,preds)||[];
  var appliedResult=applyEmergentToTop3(top5.slice(),patterns,scores);
  var promoted=appliedResult.promotions||[];
  // Build watchouts: (entries, predictions, bcsResult, top5Codes, letter)
  var watchouts=buildWatchouts(entries,preds,result,top5Codes,activeShop)||[];

  var lt=db.shops[activeShop]&&db.shops[activeShop].learnedThresholds||null;

  function codeRow(c,type,scorePct){
    var snap=snaps[c]||{};
    var consensus=buildSignalConsensus(c,snap,weights,weights);
    var topDriving=consensus.yesSignals.slice(0,2).map(function(k){return SIGNAL_NAMES&&SIGNAL_NAMES[k]||k;}).join(' &#xB7; ');
    var grade=buildCodeConfidenceGrade(c,snap,weights,entries,preds,activeShop,scorePct);
    var typeIcon=type==='top5'?'':type==='promoted'?'&#x1F52C;':type==='watchout'?'&#x26A0;&#xFE0F;':'&#x1F3AF;';
    var col=type==='top5'?'var(--text)':type==='promoted'?'var(--green)':type==='watchout'?'var(--gold)':'var(--teal)';
    return '<div class="pred-code-row">'
      +(typeIcon?'<span style="font-size:11px;min-width:16px">'+typeIcon+'</span>':'<span style="min-width:16px"></span>')
      +'<span class="pred-code" style="color:'+col+'">'+c+'</span>'
      +'<span class="pred-grade" style="color:'+grade.col+'">['+grade.grade+']'
        +(grade.adapted?'<sup style="color:var(--green);font-size:7px">&#x2605;</sup>':'')
      +'</span>'
      +'<div class="pred-bar-track"><div class="pred-bar-fill" style="width:'+scorePct+'%;background:'+(consensus.yesSignals.length?SIGNAL_COLORS[consensus.yesSignals[0]]||'var(--accent)':'var(--muted)')+'"></div></div>'
      +'<span class="pred-pct">'+scorePct+'%</span>'
      +'<span class="pred-sigs">'+topDriving+'</span>'
      +'</div>';
  }

  var html='';

  // Top-5
  html+=top5.map(function(x){
    var pct=Math.round(x[1]/fullMax*100);
    return codeRow(x[0],'top5',pct);
  }).join('');

  // Promoted
  var promoExtra=promoted.filter(function(p){return top5Codes.indexOf(p.promoted)===-1;});
  if(promoExtra.length){
    html+='<div class="pred-divider"></div>';
    html+=promoExtra.map(function(p){
      var pct=Math.round((scores[p.promoted]||0)/fullMax*100);
      return codeRow(p.promoted,'promoted',pct);
    }).join('');
  }

  // Watchouts
  var wExtra=watchouts.filter(function(w){return top5Codes.indexOf(w.code)===-1&&promoExtra.indexOf(w)===-1;});
  if(wExtra.length){
    html+='<div class="pred-divider"></div>';
    html+=wExtra.map(function(w){
      var pct=Math.round((scores[w.code]||0)/fullMax*100);
      return codeRow(w.code,'watchout',pct);
    }).join('');
  }

  el.innerHTML=html||'<div class="empty"><p>No prediction available</p></div>';
}

function renderPairs(entries, scores){
  var el=document.getElementById('pairs-panel');
  if(!el) return;
  if(entries.length<5){
    el.innerHTML='<div class="muted" style="font-size:12px">Need 5+ entries for pair analysis</div>';
    return;
  }

  var tight=buildTightCooccurrence(entries);
  var n=entries.length;

  // Top tight pairs
  var tightPairs=[];
  if(tight&&tight.pairs){
    Object.entries(tight.pairs).forEach(function(kv){
      var parts=kv[0].split('|');
      tightPairs.push({a:parts[0],b:parts[1],count:kv[1],pct:Math.round(kv[1]/n*100)});
    });
  }
  tightPairs.sort(function(a,b){return b.count-a.count;});

  var html='';
  if(tightPairs.length){
    html+='<div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Tight pairs (always together)</div>';
    html+=tightPairs.slice(0,6).map(function(p){
      return '<div class="pair-row">'
        +'<span class="pair-codes">'+p.a+' + '+p.b+'</span>'
        +'<span class="pair-meta">appear together</span>'
        +'<span class="pair-pct" style="color:var(--green)">'+p.pct+'%</span>'
        +'</div>';
    }).join('');
  }

  // Co-occurrence implications — pass top5Codes derived from scores
  var top5Codes=scores?Object.entries(scores).sort(function(a,b){return b[1]-a[1];}).slice(0,5).map(function(x){return x[0];}):[];
  if(!top5Codes.length){
    // Fallback: use most frequent codes
    var freq={};
    entries.forEach(function(e){e.codes.forEach(function(c){freq[c]=(freq[c]||0)+1;});});
    top5Codes=Object.entries(freq).sort(function(a,b){return b[1]-a[1];}).slice(0,5).map(function(x){return x[0];});
  }
  var impls=buildCooccurImplications(entries,top5Codes);
  if(impls&&impls.length){
    html+='<div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:10px 0 6px">Implications (if A &#x2192; likely B)</div>';
    html+=impls.slice(0,6).map(function(r){
      // buildCooccurImplications returns {impliedCode, via, rate, reverseRate, tight}
      return '<div class="pair-row">'
        +'<span class="pair-codes">'+r.via+'</span>'
        +'<span class="pair-meta">&#x2192; '+r.impliedCode+'</span>'
        +'<span class="pair-pct" style="color:var(--accent)">'+r.rate+'%</span>'
        +'</div>';
    }).join('');
  }

  el.innerHTML=html||'<div class="muted" style="font-size:12px">No strong pairs detected yet</div>';
}

function renderTrackScore(){
  var el=document.getElementById('track-score-panel');
  if(!el) return;
  db=loadDB();
  var entries=shopEntries(activeShop);
  var preds=shopPreds(activeShop);
  if(entries.length<3){
    el.innerHTML='<div class="muted" style="font-size:12px">Need 3+ entries</div>';
    return;
  }

  var ms=shopModelStatus(activeShop);
  var confCls=ms.level==='high'?'conf-high':ms.level==='med'?'conf-med':ms.level==='low'?'conf-low':'conf-none';

  // Observation window states
  var obs=shopObs(activeShop)||{};
  var obsStates=Object.entries(obs).filter(function(kv){return kv[1]&&kv[1].state&&kv[1].state!=='idle';});

  var html='<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">'
    +'<span class="conf-badge '+confCls+'">'+verdictLabel(ms.level)+'</span>'
    +(ms.hitRate!==null?'<span style="font-size:12px;color:var(--muted)">'+ms.hitRate+'% hit &#xB7; '+ms.slotCov+'% slot</span>':'')
    +'</div>';

  // Per-code grade table from pending prediction
  var pending=preds.filter(function(p){return p.status==='pending';})[0];
  if(pending){
    var result=buildCombinedScore(entries,preds,activeShop);
    var scores=result.scores;
    var snaps=result.snapshots;
    var weights=result.weights;
    var top5=Object.entries(scores).sort(function(a,b){return b[1]-a[1];}).slice(0,5);
    var fullMax=Math.max.apply(null,Object.values(scores).concat([0.001]));
    html+='<div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Current prediction grades</div>';
    html+=top5.map(function(x){
      var c=x[0];
      var pct=Math.round(x[1]/fullMax*100);
      var snap=snaps[c]||{};
      var grade=buildCodeConfidenceGrade(c,snap,weights,entries,preds,activeShop,pct);
      var obsState=(obs[c]&&obs[c].state!=='idle')?'<span style="font-size:9px;color:var(--gold)"> '+obs[c].state.toUpperCase()+'</span>':'';
      return '<div style="display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid var(--border)">'
        +'<span class="mono" style="font-weight:900;min-width:28px;color:var(--accent)">'+c+'</span>'
        +'<span style="font-size:11px;font-weight:900;font-family:var(--mono);color:'+grade.col+'">['+grade.grade+']'+(grade.adapted?'<sup style="color:var(--green);font-size:7px">&#x2605;</sup>':'')+'</span>'
        +'<div style="flex:1;height:4px;background:var(--surface3);border-radius:2px;overflow:hidden">'
          +'<div style="width:'+pct+'%;height:100%;background:'+grade.col+';border-radius:2px"></div>'
        +'</div>'
        +'<span style="font-size:11px;font-family:var(--mono);color:var(--muted)">'+pct+'%</span>'
        +obsState
        +'</div>';
    }).join('');
  }

  // Observation window — collapsible
  if(obsStates.length){
    var obsRows=obsStates.map(function(kv){
      var col=kv[1].state==='confirmed'?'var(--red)':kv[1].state==='watching'?'var(--gold)':'var(--muted)';
      return '<div style="display:flex;align-items:center;gap:8px;padding:3px 0;border-bottom:1px solid var(--border)">'
        +'<span class="mono" style="color:var(--accent);min-width:28px">'+kv[0]+'</span>'
        +'<span style="font-size:11px;color:'+col+'">'+kv[1].state+'</span>'
        +(kv[1].count?'<span style="font-size:10px;color:var(--muted);margin-left:auto">'+kv[1].count+'x</span>':'')
        +'</div>';
    }).join('');
    html+='<div style="margin-top:8px">'
      +'<div onclick="toggleObsWindow(this)" '
      +'style="display:flex;align-items:center;gap:6px;cursor:pointer;padding:4px 0;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">'
      +'Obs Window <span style="color:var(--gold);font-weight:900">'+obsStates.length+'</span>'
      +'<span class="obs-arrow" style="margin-left:auto">&#x25BE;</span>'
      +'</div>'
      +'<div style="display:none">'+obsRows+'</div>'
      +'</div>';
  }

  el.innerHTML=html;
}

function renderTrackHistory(){
  var entries2=shopEntries(activeShop);
  var predsAll=shopPreds(activeShop);
  var resolved=predsAll.filter(function(p){return p.status!=='pending'&&p.outcome;});

  var chartEl=document.getElementById('track-accuracy-chart');
  var histEl=document.getElementById('track-history');

  if(!resolved.length){
    if(chartEl) chartEl.innerHTML='';
    if(histEl) histEl.innerHTML='<div class="empty"><div class="empty-icon">&#x1F4CA;</div><p>No resolved predictions yet. Enter refills and rebuild to generate history.</p></div>';
    return;
  }

  // Accuracy stats
  var totalH=0,totalP=0;
  resolved.forEach(function(p){Object.values(p.outcome).forEach(function(v){totalP++;if(v==='hit')totalH++;});});
  var pct=totalP>0?Math.round(totalH/totalP*100):0;
  var col=pct>=60?'var(--green)':pct>=33?'var(--gold)':'var(--red)';

  var last5=resolved.slice(-5),prior5=resolved.slice(-10,-5);
  
  var l5=bRate(last5),p5=bRate(prior5);
  var delta=l5!==null&&p5!==null?l5-p5:null;

  // Chart
  if(chartEl){
    var bars=resolved.slice(-20).map(function(p){
      var h=Object.values(p.outcome).filter(function(v){return v==='hit';}).length;
      var r=Math.round(h/p.predictedCodes.length*100);
      var bc=r===100?'var(--green)':r>=60?'var(--teal)':r>=33?'var(--gold)':'var(--red)';
      var bh=Math.max(4,Math.round(r*0.44));
      return '<div class="acc-bar" style="height:'+bh+'px;background:'+bc+'" title="'+r+'%"></div>';
    }).join('');

    var dots='';
    if(resolved.length>=5){
      var resl=resolved.slice(-20);
      resl.forEach(function(_,i,arr){
        var win=arr.slice(Math.max(0,i-4),i+1);
        var h2=0,t2=0;win.forEach(function(p){Object.values(p.outcome).forEach(function(v){t2++;if(v==='hit')h2++;});});
        var v=t2?Math.round(h2/t2*100):null;
        if(v===null) return;
        var x=Math.round((i+0.5)/resl.length*100);
        var y=44-Math.round(v*0.44);
        dots+='<div class="acc-ma-dot" style="left:'+x+'%;top:'+y+'px"></div>';
      });
    }

    chartEl.innerHTML=
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">'
        +'<span style="font-size:24px;font-weight:900;font-family:var(--mono);color:'+col+'">'+pct+'%</span>'
        +'<div style="font-size:11px;color:var(--muted)">'
          +'code hit rate &#xB7; '+resolved.length+' predictions'
          +(l5!==null?'<br>last 5: <strong style="color:'+(l5>=pct?'var(--green)':'var(--gold)')+'">'+l5+'%</strong>':'')
          +(p5!==null?' &#xB7; prior 5: <strong>'+p5+'%</strong>':'')
          +(delta!==null?' <span style="color:'+(delta>3?'var(--green)':delta<-3?'var(--red)':'var(--muted)')+'">'+( delta>0?'&#x2191;':'&#x2193;')+(delta>0?'+':'')+delta+'%</span>':'')
        +'</div>'
      +'</div>'
      +'<div style="position:relative">'
        +'<div class="acc-chart">'+bars+'</div>'
        +'<div style="position:absolute;inset:0;pointer-events:none">'+dots+'</div>'
      +'</div>';
  }

  // History table — last prediction visible, rest collapsible
  if(histEl){
    var revList=resolved.slice().reverse();
    var first=revList[0];
    var rest=revList.slice(1);
    var firstTE=entries2.filter(function(e){return e.date<=first.createdDate;});
    var firstTP=predsAll.filter(function(q){return q.createdDate<first.createdDate;});
    var firstHTML=predCardHTML(first,false,firstTE,firstTP);
    var restHTML='';
    if(rest.length){
      restHTML='<div>'
        +'<div onclick="toggleObsWindow(this)" style="display:flex;align-items:center;gap:6px;cursor:pointer;padding:6px 0;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;border-top:1px solid var(--border)">'
        +'Prior predictions <span style="color:var(--accent);font-weight:900">'+rest.length+'</span>'
        +'<span class="obs-arrow" style="margin-left:auto">&#x25BE;</span>'
        +'</div>'
        +'<div style="display:none">'
        +rest.map(function(p){
          var te=entries2.filter(function(e){return e.date<=p.createdDate;});
          var tp=predsAll.filter(function(q){return q.createdDate<p.createdDate;});
          return predCardHTML(p,false,te,tp);
        }).join('')
        +'</div>'
        +'</div>';
    }
    histEl.innerHTML=firstHTML+restHTML;
  }
}

function undoLearnerUpdate(){
  if(!activeShop) return;
  db=loadDB();
  var a=db.shops[activeShop]&&db.shops[activeShop].learnerAlert;
  var restoreW=a&&a.prevW?a.prevW:(db.shops[activeShop].preManualWeights||null);
  if(!restoreW){showToast('Nothing to undo');return;}
  db.shops[activeShop].weights=Object.assign({},restoreW);
  db.shops[activeShop].learnerAlert=null;
  db.shops[activeShop].learnerSnapshots=[];
  saveDB(db);
  document.getElementById('learner-alert').style.display='none';
  showToast('Model update undone','ok');
}

function applyLearnerWeights(){
  if(!activeShop) return;
  db=loadDB();
  var a=db.shops[activeShop]&&db.shops[activeShop].learnerAlert;
  if(a&&a.learnedW){
    snapshotCurrentWeights(activeShop);
    db.shops[activeShop].weights=a.learnedW;
    db.shops[activeShop].learnerAlert=Object.assign({},a,{applied:true,needsAlert:false});
    saveDB(db);
    recordModelDecision(activeShop,'apply',a.learnedW,a);
  }
  rebuildActiveShop();
  dismissLearnerAlert();
  showToast('Model applied — rebuilding','ok');
}

function dismissLearnerAlert(isHold){
  // Record hold decision if owner explicitly chose to keep current model
  if(isHold&&activeShop){
    db=loadDB();
    var a=db.shops[activeShop]&&db.shops[activeShop].learnerAlert;
    if(a) recordModelDecision(activeShop,'hold',null,a);
  }
  if(!activeShop) return;
  db=loadDB();
  if(db.shops[activeShop]) db.shops[activeShop].learnerAlert=null;
  saveDB(db);
  document.getElementById('learner-alert').style.display='none';
}

// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
function renderBestPredList(){
  var el=document.getElementById('best-pred-list');
  if(!el||!activeShop) return;
  db=loadDB();
  var preds=shopPreds(activeShop).filter(function(p){
    return p.status!=='pending'&&p.outcome&&p.weightsAtTime&&Object.keys(p.weightsAtTime).length>0;
  });
  if(!preds.length){
    el.innerHTML='<div class="muted" style="font-size:12px">No resolved predictions with saved weights yet</div>';
    return;
  }
  function hitRate(p){var h=0,t=0;Object.values(p.outcome).forEach(function(v){t++;if(v==='hit')h++;});return t?h/t:0;}
  var pinned=db.shops[activeShop].pinnedPredId;
  var currentW=getWeights(activeShop);
  var candidates=preds.slice().sort(function(a,b){return hitRate(b)-hitRate(a);}).slice(0,5);

  // Phase 1: render immediately with single-prediction rates
  function rowHTML(p, btInfo){
    var h=Object.values(p.outcome).filter(function(v){return v==='hit';}).length;
    var r=Math.round(hitRate(p)*100);
    var d=(p.actualDate||p.createdDate||'').slice(5);
    var isPinned=String(p.id)===String(pinned);
    var btHTML='';
    if(btInfo){
      var btCol=btInfo.diff>0?'var(--green)':btInfo.diff<0?'var(--red)':'var(--muted)';
      var diffStr=btInfo.diff>0?'\u2191+'+btInfo.diff+'%':btInfo.diff<0?'\u2193'+btInfo.diff+'%':'= No diff';
      btHTML='<span style="font-family:var(--mono);font-weight:900;color:var(--text)">'+btInfo.rate+'%</span>'
        +' <span style="font-size:10px;color:var(--muted)">'+btInfo.n+' refills</span>'
        +' <span style="color:'+btCol+';font-size:10px">'+diffStr+'</span>';
    } else {
      btHTML='<span style="font-size:10px;color:var(--muted)">computing\u2026</span>';
    }
    return '<div id="bprow-'+p.id+'" style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)">'
      +'<div style="flex:1">'
        +'<div style="font-size:10px;color:var(--muted);margin-bottom:1px">Backtest '+btHTML+'</div>'
        +'<div>'
          +'<span class="mono" style="font-size:11px;color:var(--muted)">'+h+'/'+p.predictedCodes.length+' on '+d+'</span>'
          +(isPinned?'<span style="font-size:10px;color:var(--gold);margin-left:6px">&#x2605; anchored</span>':'')
        +'</div>'
        +'<div style="font-size:11px;color:var(--muted);margin-top:1px">'
          +p.predictedCodes.map(function(c){
            return '<span style="color:'+(p.outcome[c]==='hit'?'var(--green)':'var(--muted)')+'">'+c+'</span>';
          }).join(' ')
        +'</div>'
      +'</div>'
      +'<button class="btn btn-secondary btn-sm" '
        +'style="'+(isPinned?'border-color:var(--gold);color:var(--gold)':'')+'" '
        +'onclick="useBestPredModel(\''+p.id+'\')">'
        +(isPinned?'&#x2605; Anchored':'Use this')
      +'</button>'
    +'</div>';
  }

  // Render immediately
  el.innerHTML=candidates.map(function(p){return rowHTML(p,null);}).join('');

  // Phase 2: backtest each row lazily with delay between each
  candidates.forEach(function(p, idx){
    setTimeout(function(){
      var fromDate=p.actualDate||p.createdDate;
      var bt=backtestWeights(activeShop,p.weightsAtTime,fromDate);
      var btCur=bt?backtestWeights(activeShop,currentW,fromDate):null;
      var btInfo=bt?{
        rate:bt.hitRate,
        n:bt.detail.length,
        diff:btCur?bt.hitRate-btCur.hitRate:null
      }:null;
      var row=document.getElementById('bprow-'+p.id);
      if(row) row.outerHTML=rowHTML(p,btInfo);
    }, idx*300); // 300ms apart — responsive, not blocking
  });
}

function backtestWeights(letter, weights, fromDate){
  // Score each refill from fromDate onward using given weights
  // Returns {hits, total, hitRate, detail}
  db=loadDB();
  var entries=shopEntries(letter).slice().sort(function(a,b){return a.date.localeCompare(b.date);});
  var fromIdx=entries.findIndex(function(e){return e.date>fromDate;});
  if(fromIdx<3) return null; // need training data before fromDate
  var hits=0,total=0,detail=[];
  for(var i=fromIdx;i<entries.length-1;i++){
    var trainEntries=entries.slice(0,i);
    var actual=entries[i].codes;
    // Score directly using provided weights — bypass getWeights/loadDB
    var scores=buildWeightedScoreDirect(trainEntries, weights);
    var top5=Object.entries(scores).sort(function(a,b){return b[1]-a[1];}).slice(0,5).map(function(x){return x[0];});
    var h=top5.filter(function(c){return actual.indexOf(c)>-1;}).length;
    hits+=h; total+=top5.length;
    detail.push({date:entries[i].date,hits:h,total:top5.length});
  }
  return {hits:hits,total:total,hitRate:total?Math.round(hits/total*100):0,detail:detail};
}

function buildWeightedScoreDirect(entries, weights){
  // Score all codes using provided weights directly — no DB access
  if(!entries||entries.length<3) return {};
  var w=Object.assign({},DEFAULT_WEIGHTS,weights);
  var freq=buildFreqMap(entries);
  var recency=buildWeightedScore(entries);
  var streaks=buildStreaks(entries);
  var cooccur=buildCooccurrence(entries);
  var cycle=buildCycleScore(entries);
  var momentum=(buildMomentumScore(entries).scores)||{};
  var overdue=buildOverdueScore(entries);
  var interval=buildIntervalRegularity(entries);
  var dow=buildDayOfWeekScore(entries);
  var qty=buildQtyDominance(entries);
  var qtyStreak=buildQtyStreak(entries);
  var allCodes=Array.from(new Set(entries.reduce(function(a,e){return a.concat(e.codes);},[]) ));
  var scores={};
  allCodes.forEach(function(c){
    scores[c]=
      (freq[c]||0)*w.freq+
      (recency[c]||0)*w.recency+
      (streaks[c]||0)*w.streak+
      (cooccur[c]||0)*w.cooccur+
      (cycle[c]||0)*w.cycle+
      (momentum[c]||0)*w.momentum+
      (overdue[c]||0)*w.overdue+
      (interval[c]||0)*w.interval+
      (dow[c]||0)*w.dow+
      (qty[c]||0)*w.qtydom+
      (qtyStreak[c]||0)*w.qtystreak+
      w.bias;
  });
  return scores;
}

function useBestPredModel(predId){
  if(!activeShop) return;
  db=loadDB();
  var pred=shopPreds(activeShop).find(function(p){return String(p.id)===String(predId);});
  if(!pred||!pred.weightsAtTime) return;
  var fromDate=pred.actualDate||pred.createdDate;

  // Backtest anchor weights vs current weights from anchor date forward
  var anchorTest=backtestWeights(activeShop,pred.weightsAtTime,fromDate);
  var currentWeights=getWeights(activeShop);
  var currentTest=backtestWeights(activeShop,currentWeights,fromDate);
  var diff=anchorTest&&currentTest?anchorTest.hitRate-currentTest.hitRate:null;
  var btN=anchorTest?anchorTest.detail.length:0;

  snapshotCurrentWeights(activeShop);
  db.shops[activeShop].weights=Object.assign({},pred.weightsAtTime);
  db.shops[activeShop].pinnedPredId=String(predId);

  // Store anchor comparison in learnerAlert so PREDICT tab shows it
  var h=Object.values(pred.outcome).filter(function(v){return v==='hit';}).length;
  var t=pred.predictedCodes.length;
  var isPositive=diff!==null&&diff>0;
  db.shops[activeShop].learnerAlert={
    ts:Date.now(),
    isAnchor:true,
    anchorDate:fromDate.slice(5),
    anchorHits:h,anchorTotal:t,
    hitGain:isPositive?1:0,
    applied:false,needsAlert:true,
    alertReason:isPositive
      ?'Anchor from '+fromDate.slice(5)+' outperforms current model over '+btN+' refills'
      :'Anchor from '+fromDate.slice(5)+' does not outperform current model over '+btN+' refills',
    btAnchorRate:anchorTest?anchorTest.hitRate:null,
    btCurrentRate:currentTest?currentTest.hitRate:null,
    btDiff:diff,btN:btN,
    learnedW:pred.weightsAtTime,
    prevW:currentWeights,
    consistencyPct:null,snapshotCount:0,
    currentHits:currentTest?Math.round(currentTest.hitRate*btN/100):0,
    learnedHits:anchorTest?Math.round(anchorTest.hitRate*btN/100):0,
    testN:btN,
    learnedOnly:[],currentOnly:[],topBoost:[],topReduce:[],
    missedOpportunities:[]
  };
  saveDB(db);

  renderBestPredList();

  var resultEl=document.getElementById('optimize-result');
  if(resultEl){
    var col=diff>0?'var(--green)':diff<0?'var(--red)':'var(--muted)';
    var arrow=diff>0?'\u2191':diff<0?'\u2193':'';
    var diffLabel=diff>0?(arrow+'+'+diff+'%'):diff<0?(arrow+diff+'%'):'= No difference';
    var btHTML='';
    if(anchorTest&&currentTest&&anchorTest.total>0){
      btHTML='<div style="margin-top:6px;border-top:1px solid var(--border);padding-top:6px">'
        +'<div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Backtest from '+fromDate.slice(5)+' ('+btN+' refills)</div>'
        +'<div style="display:flex;align-items:baseline;gap:8px;margin-bottom:2px">'
          +'<span style="font-size:16px;font-family:var(--mono);font-weight:900;color:'+col+'">'+diffLabel+'</span>'
          +'<span style="font-size:10px;color:var(--muted)">vs current model</span>'
        +'</div>'
        +'<div style="display:flex;gap:10px;font-size:10px;color:var(--muted);margin-bottom:4px">'
          +'<span>Anchor <span style="font-family:var(--mono);color:var(--text)">'+anchorTest.hitRate+'%</span></span>'
          +'<span>Current <span style="font-family:var(--mono);color:var(--text)">'+currentTest.hitRate+'%</span></span>'
        +'</div>'
        +'<div style="font-size:10px;color:var(--muted)">Tap PREDICT to see learner recommendation</div>'
      +'</div>';
    }
    resultEl.innerHTML='<div class="alert alert-ok">\u2605 Anchored to '+fromDate.slice(5)+' model ('+h+'/'+t+' hits). Run Rebuild to apply.</div>'+btHTML;
  }
  showToast('Model anchored \u2014 tap PREDICT','ok');
}

// OPTIMIZE (Track tab)
// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
function resetToCurrentWeights(){
  if(!activeShop){showToast('Select a shop first');return;}
  db=loadDB();
  var preds=shopPreds(activeShop);
  var lastLive=null;
  for(var i=preds.length-1;i>=0;i--){
    if(preds[i].frozenScores&&preds[i].weightsAtTime&&Object.keys(preds[i].weightsAtTime).length){
      lastLive=preds[i]; break;
    }
  }
  var restoreW=lastLive?lastLive.weightsAtTime:(db.shops[activeShop].preManualWeights||null);
  if(!restoreW||!Object.keys(restoreW).length){
    var el=document.getElementById('optimize-result');
    if(el) el.innerHTML='<div class="alert alert-info">No model snapshot found \u2014 weights are at defaults.</div>';
    return;
  }
  db.shops[activeShop].weights=Object.assign({},restoreW);
  delete db.shops[activeShop].preManualWeights;
  saveDB(db);
  var src=lastLive?'weights from '+(lastLive.createdDate||'last entry'):'pre-manual snapshot';
  var el=document.getElementById('optimize-result');
  if(el) el.innerHTML='<div class="alert alert-ok">&#x21A9; Restored current model \u2014 '+src+'</div>';
  showToast('Current model restored','ok');
}

// RESOLUTION
// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
var resolveId=null, resolveState={};

function openResolveModal(predId){
  db=loadDB();
  var pred=shopPreds(activeShop).find(function(p){return String(p.id)===String(predId);});
  if(!pred) return;
  resolveId=pred.id;
  resolveState={};
  pred.predictedCodes.forEach(function(c){resolveState[c]='miss';});
  var el=document.getElementById('resolve-body');
  el.innerHTML=pred.predictedCodes.map(function(c){
    return '<div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border)">'
      +'<span class="mono" style="font-weight:900;font-size:15px;min-width:30px;color:var(--accent)">'+c+'</span>'
      +'<div style="display:flex;gap:6px">'
        +'<button class="btn btn-secondary btn-sm" id="rhit-'+c+'" onclick="setResolveCode(\''+c+'\',\'hit\')">&#x2713; Hit</button>'
        +'<button class="btn btn-secondary btn-sm" id="rmiss-'+c+'" onclick="setResolveCode(\''+c+'\',\'miss\')" style="opacity:.5">&#x2717; Miss</button>'
      +'</div>'
    +'</div>';
  }).join('');
  document.getElementById('resolve-date').value=todayStr();
  openModal('modal-resolve');
}

function setResolveCode(c,val){
  resolveState[c]=val;
  var hitBtn=document.getElementById('rhit-'+c);
  var missBtn=document.getElementById('rmiss-'+c);
  if(hitBtn) hitBtn.style.opacity=val==='hit'?'1':'.5';
  if(missBtn) missBtn.style.opacity=val==='miss'?'1':'.5';
}

function submitResolution(){
  if(!activeShop||resolveId===null) return;
  var actualDate=document.getElementById('resolve-date').value||todayStr();
  db=loadDB();
  var pred=shopPreds(activeShop).find(function(p){return p.id===resolveId;});
  if(!pred){closeModal('modal-resolve');return;}
  pred.outcome=Object.assign({},resolveState);
  pred.status=resolveStatus(resolveState);
  pred.actualDate=actualDate;
  pred.actualCodes=Object.keys(resolveState).filter(function(c){return resolveState[c]==='hit';});
  pred.liveResolved=true;
  saveDB(db);
  processObservationWindow(activeShop, pred);
  closeModal('modal-resolve');
  renderTrackTab();
  showToast('Resolved: '+pred.status,'ok');
}

// Wire rebuildPredictions/rebuildShop to use our callbacks
var _origRebuildPredictions=rebuildPredictions;
function rebuildShop(letter, onDone){
db=loadDB();
var s=db.shops[letter];
var entries=(s.entries||[]).slice().sort(function(a,b){return a.date.localeCompare(b.date);});
if(entries.length<4){ onDone(0); return; }
var liveResolved=(s.predictions||[]).filter(function(p){return p.liveResolved&&p.outcome&&Object.keys(p.outcome).length>0;});
var liveResolvedDates=liveResolved.reduce(function(m,p){m[p.actualDate]=true;return m;},{});
var lastEntryDate=entries[entries.length-1].date;
var existing=(s.predictions||[]).filter(function(p){return p.status==='pending';});
var livePendingToKeep=existing.length>0&&existing[0].createdDate>=lastEntryDate?existing[0]:null;
// Clear auto predictions, keep live resolved
db.shops[letter].predictions=(s.predictions||[]).filter(function(p){return !p.auto||p.liveResolved;});
db.shops[letter].obsWindow={};
db.shops[letter].gradAccum={};
saveDB(db);
var i=2;
var resolvedCount=0;
var total=entries.length-2;
var STEP_DELAY=50; // ms — gives iOS Safari time to breathe between steps
function processStep(){
// Done — build final pending prediction
if(i>=entries.length-1){
db=loadDB();
var allEntries=(db.shops[letter].entries||[]).slice().sort(function(a,b){return a.date.localeCompare(b.date);});
if(allEntries.length>=3){
if(livePendingToKeep){
db.shops[letter].predictions.push(livePendingToKeep);
saveDB(db);
} else {
var allPreds=shopPreds(letter);
var finalResult=buildCombinedScore(allEntries,allPreds,letter);
var finalTop5=Object.entries(finalResult.scores).sort(function(a,b){return b[1]-a[1];}).slice(0,5);
if(finalTop5.length){
var fMax=finalTop5[0][1];
var fFullMax=Math.max.apply(null,Object.values(finalResult.scores).concat([0.001]));
var fNorm={};
Object.keys(finalResult.scores).forEach(function(c){fNorm[c]=Math.round(finalResult.scores[c]/fFullMax*100);});
db.shops[letter].lastFullScores=fNorm;
// Compact snapshots
var compactSnaps={};
Object.keys(finalResult.snapshots||{}).forEach(function(c){
var snap=finalResult.snapshots[c];if(!snap)return;
var cs={};Object.keys(snap).forEach(function(k){if(snap[k]>0)cs[k]=Math.round(snap[k]*100);});
if(Object.keys(cs).length)compactSnaps[c]=cs;
});
var predId=Date.now();
saveSnapshot(predId,compactSnaps);
db.shops[letter].predictions.push({
id:predId,createdDate:allEntries[allEntries.length-1].date,
modelVersion:SIGNAL_VERSION,
predictedCodes:finalTop5.map(function(x){return x[0];}),
promotedCodes:[],patternRules:[],watchoutCodes:[],
regimeAtTime:null,
scores:finalTop5.reduce(function(o,x){o[x[0]]=Math.round(x[1]/fMax*100);return o;},{}),
frozenScores:fNorm,
frozenSnapshots:compactSnaps,
weightsAtTime:Object.assign({},finalResult.weights),
status:'pending',outcome:null,actualDate:null,actualCodes:null,auto:true,
    modelVerId:(db.shops[letter]&&db.shops[letter].currentModelVerId)||null
});
saveDB(db);
}
}
}
onDone(resolvedCount);
return;
}
// Skip liveResolved dates
var nextEntry=entries[i+1];
if(liveResolvedDates[nextEntry.date]){
i++;showProgress(letter,i-2,total);
setTimeout(processStep,STEP_DELAY);return;
}
// PHASE 1: Score and resolve (fast)
db=loadDB();
var trainEntries=entries.slice(0,i+1);
var currentPreds=shopPreds(letter);
// Lightweight scoring — skip patterns/watchouts for speed
var result=buildCombinedScore(trainEntries,currentPreds,letter);
var top5=Object.entries(result.scores).sort(function(a,b){return b[1]-a[1];}).slice(0,5);
if(top5.length){
var top5Max=top5[0][1];
var avgQty=buildAvgQty(trainEntries);
var outcome={};
top5.forEach(function(x){
var c=x[0];
var cnt=nextEntry.codes.filter(function(nc){return nc===c;}).length;
outcome[c]=cnt===0?'miss':cnt>=Math.round(avgQty[c]||1)?'hit':'partial';
});
// Compact snapshots
var compactSnaps2={};
Object.keys(result.snapshots||{}).forEach(function(c){
var snap=result.snapshots[c];if(!snap)return;
var cs={};Object.keys(snap).forEach(function(k){if(snap[k]>0)cs[k]=Math.round(snap[k]*100);});
if(Object.keys(cs).length)compactSnaps2[c]=cs;
});
var fullMax=Math.max.apply(null,Object.values(result.scores).concat([0.001]));
var normScores={};
Object.keys(result.scores).forEach(function(c){normScores[c]=Math.round(result.scores[c]/fullMax*100);});
var predId2=Date.now();
saveSnapshot(predId2,compactSnaps2);
var pred={
id:predId2,createdDate:trainEntries[trainEntries.length-1].date,
modelVersion:SIGNAL_VERSION,
predictedCodes:top5.map(function(x){return x[0];}),
promotedCodes:[],patternRules:[],watchoutCodes:[],
triggeredOutcome:{},regimeAtTime:null,
scores:top5.reduce(function(o,x){o[x[0]]=Math.round(x[1]/top5Max*100);return o;},{}),
frozenScores:normScores,
frozenSnapshots:compactSnaps2,
weightsAtTime:Object.assign({},result.weights),
status:resolveStatus(outcome),
outcome:outcome,
actualDate:nextEntry.date,
actualCodes:nextEntry.codes,
liveResolved:false,auto:true,
slotsCovered:nextEntry.codes.filter(function(c){return top5.some(function(x){return x[0]===c;});}).length,
totalSlots:nextEntry.codes.length
};
db.shops[letter].predictions.push(pred);
// Phase 1 save — lightweight
saveDB(db);
// PHASE 2: observation window (deferred, runs same step but after save)
processObservationWindow(letter,pred);
resolvedCount++;
}
i++;
showProgress(letter,i-2,total);
setTimeout(processStep,STEP_DELAY);
}
showProgress(letter,0,total);
setTimeout(processStep,STEP_DELAY);
}

var rebuildPredictions=function(letter){
  var shops=letter?[letter]:Object.keys(db.shops).sort();
  var idx=0;
  function next(){
    if(idx>=shops.length) return;
    var s=shops[idx++];
    rebuildShop(s,function(count){
      onRebuildDone(s,count);
      next();
    });
  }
  next();
};


// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
// PREDCARDHTML \u2014 updated to accept frozen training data
// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
function predCardHTML(pred, canResolve, trainEntries, trainPreds){
  var sColors={pending:'var(--muted)',hit:'var(--green)',partial:'var(--gold)',miss:'var(--red)'};
  var sLabels={pending:'\u23F3 Pending',hit:'&#x2705; Hit',partial:'&#x26A1; Partial',miss:'&#x274C; Miss'};

  // Use frozenScores for all codes (never top-5-only scores)
  var frozenScores=pred.frozenScores||{};
  var scores=pred.scores||{};
  var allScores={};
  Object.keys(frozenScores).forEach(function(c){allScores[c]=frozenScores[c];});
  Object.keys(scores).forEach(function(c){if(!allScores[c]) allScores[c]=scores[c];});
  var maxScore=Math.max.apply(null,Object.values(allScores).concat([1]));

  // Build code list from frozen prediction data only
  var seen=new Set();
  var allCodes=[];
  function addCode(c,type){if(seen.has(c))return;seen.add(c);allCodes.push({c:c,type:type});}
  (pred.predictedCodes||[]).forEach(function(c){addCode(c,'top5');});
  (pred.promotedCodes||[]).filter(function(c){return pred.predictedCodes.indexOf(c)===-1;}).forEach(function(c){addCode(c,'promoted');});
  (pred.watchoutCodes||[]).filter(function(c){return pred.predictedCodes.indexOf(c)===-1;}).forEach(function(c){addCode(c,'watchout');});
  if(pred.actualCodes&&pred.outcome){
    pred.actualCodes.filter(function(c){return !seen.has(c);}).forEach(function(c){addCode(c,'surprise');});
  }

  var typeIcon={top5:'',promoted:'&#x1F52C;',watchout:'&#x26A0;&#xFE0F;',surprise:'&#x1F3AF;'};
  var typeCol={top5:'var(--text)',promoted:'var(--green)',watchout:'var(--gold)',surprise:'var(--teal)'};

  var wts=pred.weightsAtTime||DEFAULT_WEIGHTS;
  var te=trainEntries||[];
  var tp=trainPreds||[];

  // Split codes into top5 and extra (promoted/watchout/surprise)
  var top5Pills=allCodes.filter(function(x){return x.type==='top5';});
  var extraCodes=allCodes.filter(function(x){return x.type!=='top5';});

  function makeRow(entry,i,allArr){
    var c=entry.c, type=entry.type;
    var outcome=pred.outcome?pred.outcome[c]:null;
    if(!outcome&&pred.triggeredOutcome&&pred.triggeredOutcome[c]) outcome=pred.triggeredOutcome[c].appeared?'hit':'miss';
    if(!outcome&&pred.actualCodes) outcome=pred.actualCodes.indexOf(c)>-1?'hit':'miss';
    var isHit=outcome==='hit',isMiss=outcome==='miss';
    var outcomeCol=isHit?'var(--green)':isMiss?'var(--red)':'var(--muted)';
    var icon=isHit?'&#x2713;':isMiss?'&#x2717;':'&#xB7;';
    var scorePct=maxScore>0?Math.round((allScores[c]||0)/maxScore*100):0;
    var allPredSnap=getSnapshotForPred(pred);
    var isCompactSnap=!!(pred.frozenSnapshots&&pred.modelVersion);
    var decompAllSnap=decompressSnap(allPredSnap,isCompactSnap);
    var rawSnap=decompAllSnap[c]||{};
    var grade=te.length>=3?buildCodeConfidenceGrade(c,rawSnap,wts,te,tp,activeShop,scorePct):{grade:'\u2014',col:'var(--muted)'};
    var codeColor=type==='top5'?(isHit?'var(--green)':isMiss?'var(--red)':'var(--text)'):typeCol[type];
    return '<div style="display:flex;align-items:center;gap:5px;padding:3px 0">'
      +(typeIcon[type]?'<span style="font-size:10px;min-width:16px">'+typeIcon[type]+'</span>':'<span style="min-width:16px"></span>')
      +'<span class="mono" style="font-size:13px;font-weight:900;min-width:28px;color:'+codeColor+'">'+c+'</span>'
      +(outcome?'<span style="font-size:11px;font-weight:700;color:'+outcomeCol+'">'+icon+'</span>':'<span style="min-width:12px"></span>')
      +'<span style="font-size:10px;font-weight:900;font-family:var(--mono);color:'+grade.col+'">['+grade.grade+']</span>'
      +'<div style="flex:1;height:4px;background:var(--surface3);border-radius:2px;overflow:hidden">'
        +'<div style="width:'+scorePct+'%;height:100%;background:'+(isHit?'var(--green)':isMiss?'var(--red)':'var(--accent)')+';border-radius:2px"></div>'
      +'</div>'
      +'<span style="font-size:10px;font-family:var(--mono);color:var(--muted);min-width:28px;text-align:right">'+scorePct+'%</span>'
      +'</div>';
  }

  var top5Html=top5Pills.map(function(e,i){return makeRow(e,i,top5Pills);}).join('');

  // Extra codes collapsible
  var extraHtml='';
  if(extraCodes.length){
    var uid='ex-'+pred.id;
    var extraRows=extraCodes.map(function(e,i){return makeRow(e,i,extraCodes);}).join('');
    var extraLabel=[];
    var nPromo=extraCodes.filter(function(x){return x.type==='promoted';}).length;
    var nWatch=extraCodes.filter(function(x){return x.type==='watchout';}).length;
    var nSurp=extraCodes.filter(function(x){return x.type==='surprise';}).length;
    if(nPromo) extraLabel.push('&#x1F52C;'+nPromo);
    if(nWatch) extraLabel.push('&#x26A0;'+nWatch);
    if(nSurp)  extraLabel.push('&#x1F3AF;'+nSurp);
    extraHtml='<div style="border-top:1px dashed var(--border);margin-top:4px">'
      +'<div onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display===\'none\'?\'block\':\'none\';this.querySelector(\'.xarrow\').textContent=this.nextElementSibling.style.display===\'none\'?\'&#x25BE;\':\'&#x25B4;\'" '
      +'style="display:flex;align-items:center;gap:6px;padding:4px 0;cursor:pointer;color:var(--muted);font-size:10px;font-weight:700">'
      +extraLabel.join(' ')
      +'<span class="xarrow" style="margin-left:auto">&#x25BE;</span>'
      +'</div>'
      +'<div style="display:none">'+extraRows+'</div>'
      +'</div>';
  }

  var top5H=pred.predictedCodes?(pred.predictedCodes.filter(function(c){return pred.outcome&&pred.outcome[c]==='hit';}).length):0;
  var top5T=pred.predictedCodes?pred.predictedCodes.length:0;
  var hRate=top5T?Math.round(top5H/top5T*100):0;
  var hCol=hRate===100?'var(--green)':hRate>=40?'var(--gold)':'var(--red)';
  var statusCol=sColors[pred.status]||'var(--muted)';
  var dateStr=(pred.actualDate||pred.createdDate||'').slice(5);

  return '<div style="padding:10px 0;border-bottom:1px solid var(--border)">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">'
      +'<span class="mono muted" style="font-size:11px">'+dateStr+'</span>'
      +'<span style="font-size:12px;font-weight:700;color:'+statusCol+'">'+sLabels[pred.status]+'</span>'
      +(pred.outcome?'<span class="mono" style="font-size:12px;font-weight:900;color:'+hCol+'">'+hRate+'%</span>':'')
    +'</div>'
    +top5Html
    +extraHtml
    +(canResolve?'<button class="btn btn-secondary btn-sm" style="margin-top:6px" onclick="openResolveModal(\''+pred.id+'\')">Resolve</button>':'')
    +'</div>';
}

// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
// SAVE REFILL (reimplemented clean)
// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
function saveTextEntry(){
  if(!activeShop){showToast('Select a shop first');return;}
  var date=document.getElementById('entry-date').value||todayStr();
  var codes=parseCodes(document.getElementById('text-input').value);
  var resultEl=document.getElementById('entry-result');
  if(!codes.length){
    if(resultEl) resultEl.innerHTML='<div class="alert alert-warn">No valid codes entered</div>';
    return;
  }
  db=loadDB();
  var dup=isDuplicateInShop(activeShop,date,codes);
  if(dup){
    if(resultEl) resultEl.innerHTML='<div class="alert alert-warn">Duplicate \u2014 '+date+' already saved: '+dup.codes.join(' ')+'</div>';
    return;
  }
  var resolveResult=addEntry(activeShop,date,codes,'text');
  renderShopPills();
  renderArchive();
  document.getElementById('text-input').value='';
  document.getElementById('tag-grid').innerHTML='';
  if(resultEl){
    var msg=resolveResult&&resolveResult.hadPrediction
      ?'&#x2705; Saved &#xB7; Prediction resolved ('+resolveResult.worstStatus+')'
      :'&#x2705; Saved';
    resultEl.innerHTML='<div class="alert alert-ok">'+msg+'</div>';
    setTimeout(function(){if(resultEl) resultEl.innerHTML='';},3000);
  }
  if(activeTab==='predict') setTimeout(renderPredictTab,100);
  if(activeTab==='track')   setTimeout(renderTrackTab,100);
}

// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
// INIT
// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550





(function init(){
  db=loadDB();
  checkStorageHealth();
  // Set entry date to today
  var d=document.getElementById('entry-date');
  if(d) d.value=todayStr();
  renderShopPills();
  restoreSectionStates();
  var shops=Object.keys(db.shops).sort();
  if(shops.length){
    selectShop(shops[0]);
  } else {
    renderDataTab();
  }
  // Event delegation for entry delete
  document.addEventListener('click',function(e){
    var t=e.target;
    if(t.dataset.delEntry) deleteEntry(t.dataset.delEntry);
    if(t.dataset.resolvePred) openResolveModal(t.dataset.resolvePred);
  });
})();

function rebuildActiveShop(){
if(!activeShop){showToast('Select a shop first');return;}
rebuildPredictions(activeShop);
}
</script>
